<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050A12">
<meta name="color-scheme" content="dark">
<meta name="supported-color-schemes" content="dark">
<title>CashFlow — Cash, delivered.</title>
<meta name="description" content="CashFlow — peer-to-peer cash delivery. Order cash to your door from verified couriers. London · UK.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23050A12'/><text x='50%25' y='52%25' text-anchor='middle' dominant-baseline='middle' font-family='Georgia,serif' font-style='italic' font-weight='600' font-size='44' fill='%2300E8B8'>F</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23050A12'/><text x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='Georgia,serif' font-style='italic' font-weight='600' font-size='128' fill='%2300E8B8'>F</text></svg>">
<link rel="manifest" href='data:application/manifest+json;utf8,{"name":"CashFlow","short_name":"CashFlow","description":"Cash, delivered.","start_url":"/","display":"standalone","orientation":"portrait","background_color":"%23050A12","theme_color":"%23050A12","icons":[{"src":"data:image/svg+xml;utf8,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 512 512%27><rect width=%27512%27 height=%27512%27 rx=%27110%27 fill=%27%23050A12%27/><text x=%2750%25%27 y=%2754%25%27 text-anchor=%27middle%27 dominant-baseline=%27middle%27 font-family=%27Georgia,serif%27 font-style=%27italic%27 font-weight=%27600%27 font-size=%27360%27 fill=%27%2300E8B8%27>F</text></svg>","sizes":"any","type":"image/svg+xml","purpose":"any maskable"}]}'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
:root{--bg:#050A12;--bg2:#080E19;--sf:#0B1221;--sf2:#111D2E;--sf3:#162236;--em:#00E8B8;--em2:rgba(0,232,184,.10);--em3:rgba(0,232,184,.20);--am:#FFB800;--am2:rgba(255,184,0,.10);--am3:rgba(255,184,0,.20);--wh:#F0F2F5;--gr:#8A9BB0;--mu:#5A6D82;--bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.10);--rd:#FF4D6A;--blu:#6C8CFF;--r:16px;--rs:12px;--st:env(safe-area-inset-top,20px);--sb:env(safe-area-inset-bottom,20px);
/* ─── BRAND THEME: Cash(white) / Flow(green) — mapped to modes ──── */
/* Requester "Cash" side — cool white/silver theme */
--req:#FFFFFF;--req-2:#E8ECF2;--req-3:#C8CDD5;--req-ink:#05110D;
--req-glow:rgba(255,255,255,.28);--req-tint:rgba(255,255,255,.08);--req-tint-2:rgba(255,255,255,.03);
--req-grad:linear-gradient(135deg,#FFFFFF 0%,#E8ECF2 55%,#C8CDD5 100%);
--req-border:rgba(255,255,255,.22);
/* Courier "Flow" side — emerald green theme */
--cour:#00E8B8;--cour-2:#00C9A0;--cour-3:#00A88B;--cour-ink:#05110D;
--cour-glow:rgba(0,232,184,.35);--cour-tint:rgba(0,232,184,.10);--cour-tint-2:rgba(0,232,184,.03);
--cour-grad:linear-gradient(135deg,#00E8B8 0%,#00C9A0 55%,#00A88B 100%);
--cour-border:rgba(0,232,184,.28);
/* Active mode accent (starts as requester/white, flipped by [data-mode]) */
--accent:var(--req);--accent-2:var(--req-2);--accent-3:var(--req-3);--accent-ink:var(--req-ink);
--accent-glow:var(--req-glow);--accent-tint:var(--req-tint);--accent-tint-2:var(--req-tint-2);
--accent-grad:var(--req-grad);--accent-border:var(--req-border)}
[data-mode="courier"]{--accent:var(--cour);--accent-2:var(--cour-2);--accent-3:var(--cour-3);--accent-ink:var(--cour-ink);--accent-glow:var(--cour-glow);--accent-tint:var(--cour-tint);--accent-tint-2:var(--cour-tint-2);--accent-grad:var(--cour-grad);--accent-border:var(--cour-border)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',-apple-system,sans-serif;background:var(--bg);color:var(--wh);overscroll-behavior:none;-webkit-font-smoothing:antialiased}
input,button,select,textarea{font-family:inherit}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(0,232,184,0)}50%{box-shadow:0 0 24px 4px rgba(0,232,184,.12)}}
@keyframes glowAmber{0%,100%{box-shadow:0 0 0 0 rgba(255,184,0,0)}50%{box-shadow:0 0 24px 4px rgba(255,184,0,.15)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes logoReveal{0%{opacity:0;transform:scale(.8) translateY(10px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

#splash{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease}
#splash.hide{opacity:0;pointer-events:none}
.splash-logo{font-size:52px;font-weight:900;letter-spacing:-2px;animation:logoReveal .8s ease forwards}
.splash-logo .w{color:var(--wh)}.splash-logo .g{background:linear-gradient(135deg,var(--em),#00D4A8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.splash-tag{font-size:14px;color:var(--mu);margin-top:12px;animation:fadeUp .8s .3s ease both}
.splash-bar{width:120px;height:3px;background:var(--sf2);border-radius:2px;margin-top:32px;overflow:hidden;animation:fadeIn .5s .5s ease both}
.splash-bar-fill{width:0;height:100%;background:var(--em);border-radius:2px;transition:width 1.2s ease}

.scr{position:absolute;inset:0;display:none;flex-direction:column;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(76px + var(--sb))}
.scr.on{display:flex;animation:fadeIn .25s ease}.scr.nt{padding-bottom:var(--sb)}

/* Auth */
#auth{justify-content:center;padding:32px;z-index:100;position:relative}
#auth::before{content:'';position:absolute;top:10%;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(0,232,184,.06) 0%,transparent 70%);pointer-events:none}
.a-logo{font-size:48px;font-weight:900;letter-spacing:-2px;margin-bottom:56px;text-align:center;position:relative;z-index:1}
.a-logo .w{color:var(--wh)}.a-logo .g{background:linear-gradient(135deg,var(--em),#00D4A8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.a-step{display:none;position:relative;z-index:1}.a-step.on{display:block}
.a-ttl{font-size:24px;font-weight:700;margin-bottom:6px}
.a-sub{font-size:14px;color:var(--gr);margin-bottom:28px;line-height:1.55}
.a-inp{width:100%;padding:16px 18px;font-size:17px;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);color:var(--wh);outline:none;transition:border .2s}
.a-inp:focus{border-color:var(--em)}.a-inp::placeholder{color:var(--mu)}
.a-btn{width:100%;padding:17px;margin-top:20px;background:var(--em);border:none;border-radius:var(--r);font-size:16px;font-weight:700;color:var(--bg);cursor:pointer;transition:opacity .2s,transform .1s}
.a-btn:active{transform:scale(.98)}.a-btn:disabled{opacity:.45}
.a-btn2{background:var(--sf2);color:var(--gr);margin-top:12px}
.a-err{color:var(--rd);font-size:13px;margin-top:10px;min-height:18px}
.a-otp{display:flex;gap:5px;margin-top:4px}
.a-dig{flex:1;height:54px;text-align:center;font-size:22px;font-weight:700;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--wh);outline:none;caret-color:var(--em)}
.a-dig:focus{border-color:var(--em);background:var(--sf2)}
.a-sent{font-size:13px;color:var(--em);margin-bottom:16px}

/* Layout */
.hdr{padding:calc(var(--st) + 14px) 20px 18px;display:flex;align-items:center;justify-content:space-between}
.hdr-g{font-size:13px;color:var(--gr)}.hdr-n{font-size:24px;font-weight:800;margin-top:2px}
.hdr-av{width:44px;height:44px;border-radius:50%;background:var(--em2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--em);cursor:pointer;border:1.5px solid rgba(0,232,184,.25)}
.hdr-back{cursor:pointer;font-size:15px;font-weight:600;color:var(--gr)}.hdr-title{font-size:17px;font-weight:700}
.sec{padding:20px}.sec-t{font-size:15px;font-weight:700;margin-bottom:14px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin:12px 20px 0}
.conn{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--sf);border-radius:var(--rs);border:1px solid var(--bd);margin:20px 20px 0}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--em);animation:pulse 1.5s infinite}
.conn-txt{font-size:13px;color:var(--gr)}.conn-r{margin-left:auto;font-size:12px;color:var(--mu)}

/* Role cards */
.roles{display:flex;gap:14px;padding:0 20px;margin-top:24px}
.role{flex:1;padding:30px 16px;border-radius:var(--r);border:1px solid var(--bd2);cursor:pointer;transition:all .3s;text-align:center;position:relative;overflow:hidden;background:var(--sf)}
.role::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;border-radius:var(--r)}
.role.get::before{background:radial-gradient(circle at 50% 120%,var(--em3) 0%,transparent 70%)}
.role.del::before{background:radial-gradient(circle at 50% 120%,var(--am3) 0%,transparent 70%)}
.role:active::before{opacity:1}
.role-i{font-size:42px;margin-bottom:14px;position:relative;z-index:1}
.role-t{font-size:17px;font-weight:700;position:relative;z-index:1}
.role-s{font-size:13px;color:var(--gr);margin-top:6px;position:relative;z-index:1}

/* Sub-role picker (courier vs cashpoint) */
.sub-roles{display:flex;gap:12px;padding:0 20px;margin-top:16px}
.sub-role{flex:1;padding:20px 14px;border-radius:var(--r);border:1px solid var(--bd2);cursor:pointer;text-align:center;background:var(--sf);transition:all .2s}
.sub-role:active{border-color:var(--am);background:rgba(255,184,0,.04)}
.sub-role .sr-i{font-size:32px;margin-bottom:8px}
.sub-role .sr-t{font-size:15px;font-weight:700}
.sub-role .sr-s{font-size:12px;color:var(--gr);margin-top:4px;line-height:1.4}

/* Amount */
.amt-display{text-align:center;padding:36px 0;background:linear-gradient(180deg,var(--sf) 0%,var(--bg2) 100%);border-radius:var(--r);margin:0 20px;border:1px solid var(--bd)}
.amt-label{font-size:12px;color:var(--mu);margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.amt-val{font-size:60px;font-weight:900;letter-spacing:-3px}
.amt-cur{font-size:34px;color:var(--mu);font-weight:600}
.amt-pre{display:flex;gap:8px;padding:16px 20px}
.amt-p{flex:1;min-width:55px;padding:13px 6px;text-align:center;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--wh)}
.amt-p:active,.amt-p.on{border-color:var(--em);color:var(--em);background:var(--em2)}

/* Address */
.addr{padding:0 20px;margin-top:20px}
.addr-wrap{position:relative}
.addr-wrap input{width:100%;padding:14px 16px 14px 44px;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--wh);font-size:15px;outline:none}
.addr-wrap input:focus{border-color:var(--em)}
.addr-wrap .pin{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px}
.addr-res{background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);margin-top:4px;max-height:200px;overflow-y:auto;display:none}
.addr-r{padding:12px 16px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--bd)}
.addr-r:active{background:var(--sf3)}

/* Fees */
.fees{background:var(--sf);border-radius:var(--r);padding:20px;margin:20px 20px 0;border:1px solid var(--bd)}
.fee-r{display:flex;justify-content:space-between;padding:7px 0;font-size:14px}
.fee-r .l{color:var(--gr)}
.fee-r.tot{border-top:1px solid var(--bd2);padding-top:14px;margin-top:10px;font-weight:700;font-size:17px}

/* Payment method */
.pay-card{background:var(--sf);border-radius:var(--r);padding:16px 20px;margin:12px 20px 0;border:1px solid var(--bd)}
.pay-opt{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--bd);cursor:pointer;transition:opacity .15s}
.pay-opt:last-child{border:none}
.pay-opt:active{opacity:.7}
.pay-opt .po-i{font-size:24px;width:36px;text-align:center}
.pay-opt .po-t{flex:1;font-size:14px;font-weight:600}
.pay-opt .po-r{width:20px;height:20px;border-radius:50%;border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center}
.pay-opt .po-r.sel{border-color:var(--em);background:var(--em)}
.pay-opt .po-r.sel::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--bg)}

/* Courier selection */
.cour-list{padding:0 20px}
.cour-opt{display:flex;align-items:center;gap:14px;padding:16px;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);margin-bottom:10px;cursor:pointer;transition:border .2s;position:relative}
.cour-opt:active{border-color:var(--em)}
.cour-opt .co-av{width:48px;height:48px;border-radius:50%;background:var(--am2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--am)}
.cour-opt .co-info{flex:1}
.cour-opt .co-name{font-size:15px;font-weight:600}
.cour-opt .co-meta{font-size:12px;color:var(--gr);margin-top:2px}
.cour-opt .co-right{text-align:right}
.cour-opt .co-fee{font-size:14px;font-weight:700}
.cour-opt .co-eta{font-size:12px;color:var(--gr)}
.cash-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase}
.cash-badge.ready{background:var(--em2);color:var(--em)}
.cash-badge.atm{background:rgba(255,255,255,.04);color:var(--mu)}

/* Delivery steps */
.del-steps{display:flex;gap:4px;margin:14px 0}
.del-step{flex:1;height:4px;border-radius:2px;background:var(--sf3)}
.del-step.done{background:var(--em)}
.del-step.done.am{background:var(--am)}
.del-hint{font-size:12px;color:var(--gr);margin-top:6px}
.step-info{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:var(--rs);margin-top:10px;font-size:12px;font-weight:600}
.step-info.flash{background:var(--em2);color:var(--em)}
.step-info.wait{background:var(--am2);color:var(--am)}

/* QR / Banknote verify */
.verify-card{text-align:center;padding:24px;background:var(--sf);border-radius:var(--r);margin:12px 20px;border:1px solid var(--bd)}
.verify-icon{font-size:56px;margin-bottom:12px}
.verify-title{font-size:18px;font-weight:700;margin-bottom:6px}
.verify-sub{font-size:13px;color:var(--gr);line-height:1.5;margin-bottom:20px}
.verify-checks{text-align:left;margin-bottom:20px}
.verify-check{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bd)}
.verify-check:last-child{border:none}
.verify-cb{width:24px;height:24px;border-radius:8px;border:2px solid var(--bd2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.verify-cb.checked{background:var(--em);border-color:var(--em)}
.verify-cb.checked::after{content:'✓';color:var(--bg);font-size:14px;font-weight:800}
.verify-check-txt{font-size:14px}

/* Courier settings */
.cour-set{background:var(--sf);border-radius:var(--r);padding:20px;margin:12px 20px 0;border:1px solid var(--bd)}
.cs-lbl{font-size:15px;font-weight:700;margin-bottom:2px}
.cs-sub{font-size:12px;color:var(--gr);margin-bottom:14px}
.cp-pre{display:flex;gap:8px}
.cp-p{flex:1;padding:12px 6px;text-align:center;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;color:var(--wh)}
.cp-p:active,.cp-p.on{border-color:var(--am);color:var(--am);background:var(--am2)}
.fee-slider{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--em) 0%,var(--am) 50%,var(--rd) 100%);outline:none;cursor:pointer}
.fee-slider::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--wh);border:3px solid var(--am);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.fp-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--gr)}
.fp-val{color:var(--wh);font-weight:600}.fp-am{color:var(--am)!important}

/* Cashpoint settings */
.cp-field{margin-bottom:12px}
.cp-field label{font-size:11px;color:var(--mu);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.cp-field input{width:100%;padding:12px 14px;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--wh);font-size:14px;outline:none}
.cp-field input:focus{border-color:var(--am)}

/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--sf);border-radius:var(--r);padding:20px;margin:0 20px;border:1px solid var(--bd)}
.toggle-track{width:56px;height:30px;border-radius:15px;background:var(--sf3);cursor:pointer;position:relative;transition:background .3s}
.toggle-track.on{background:var(--em)}.toggle-thumb{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:transform .3s;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.toggle-track.on .toggle-thumb{transform:translateX(26px)}

/* Earnings */
.earn-hero{text-align:center;padding:28px;background:linear-gradient(180deg,var(--sf) 0%,var(--bg) 100%);border-radius:var(--r);margin:16px 20px 0;border:1px solid var(--bd)}
.earn-val{font-size:48px;font-weight:900;color:var(--am);animation:countUp .5s ease}
.earn-lbl{font-size:12px;color:var(--gr);margin-top:4px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.earn-stats{display:flex;gap:10px;padding:0 20px;margin-top:12px}
.earn-stat{flex:1;background:var(--sf);border-radius:var(--rs);padding:16px;text-align:center;border:1px solid var(--bd)}
.earn-stat .v{font-size:22px;font-weight:700}
.earn-stat .l{font-size:11px;color:var(--gr);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* Heatmap */
.heatmap{padding:0 20px;margin-top:16px}
.heatmap-title{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--gr)}
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.heatmap-cell{aspect-ratio:1;border-radius:4px;background:var(--sf2)}
.heatmap-cell.l1{background:rgba(0,232,184,.1)}.heatmap-cell.l2{background:rgba(0,232,184,.25)}.heatmap-cell.l3{background:rgba(0,232,184,.45)}.heatmap-cell.l4{background:rgba(0,232,184,.7)}

/* Incoming request */
.inc-card{background:var(--sf);border:2px solid var(--am);border-radius:var(--r);padding:20px;margin:16px 20px;animation:glowAmber 2s infinite}
.inc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.inc-amt{font-size:36px;font-weight:900}.inc-fee{font-size:15px;color:var(--am);font-weight:700}
.inc-meta{font-size:13px;color:var(--gr);margin-bottom:16px}
.inc-btns{display:flex;gap:10px}
.inc-btns button{flex:1;padding:15px;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer}
.inc-accept{background:var(--am);color:var(--bg)}.inc-decline{background:var(--sf2);color:var(--gr)}

/* Map */
.map-c{height:260px;border-radius:var(--r);margin:0 20px;overflow:hidden;border:1px solid var(--bd)}.map-c>div{width:100%;height:100%}

/* Status */
.stat-card{background:var(--sf);border-radius:var(--r);padding:20px;margin:16px 20px;border:1px solid var(--bd)}
.stat-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600}
.stat-badge.active{background:var(--em2);color:var(--em)}.stat-badge.pending{background:var(--am2);color:var(--am)}
.stat-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite}
.stat-row{display:flex;justify-content:space-between;padding:9px 0;font-size:14px;border-bottom:1px solid var(--bd)}
.stat-row:last-child{border:none}.stat-row .k{color:var(--gr)}

/* Orders */
.ord{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--bd);cursor:pointer}
.ord-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.ord-ic.in{background:var(--em2)}.ord-ic.out{background:var(--am2)}
.ord-info{flex:1}.ord-info .t{font-size:15px;font-weight:600}.ord-info .b{font-size:12px;color:var(--gr);margin-top:3px}
.ord-amt{font-size:16px;font-weight:700}

/* Profile */
.prof-hdr{text-align:center;padding:calc(var(--st) + 20px) 20px 24px;background:linear-gradient(180deg,var(--sf) 0%,var(--bg) 100%);border-bottom:1px solid var(--bd)}
.prof-av{width:84px;height:84px;border-radius:50%;background:var(--em2);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:var(--em);margin:0 auto 14px;border:2px solid var(--em)}
.prof-name{font-size:24px;font-weight:800}.prof-email{font-size:13px;color:var(--gr);margin-top:4px}
.prof-ver{display:inline-flex;align-items:center;gap:4px;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;background:var(--em2);color:var(--em);margin-top:10px}
.prof-since{font-size:12px;color:var(--mu);margin-top:8px}
.prof-ml{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);padding:20px 20px 8px}
.prof-item{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--bd);cursor:pointer}
.prof-item:active{background:var(--sf)}.prof-item .pi{font-size:20px;width:28px;text-align:center}
.prof-item .pt{flex:1;font-size:15px}.prof-item .pa{color:var(--mu);font-size:16px}
.prof-item.danger .pt{color:var(--rd)}
.edit-row{display:flex;gap:8px;padding:0 20px;margin-top:8px}
.edit-row input{flex:1;padding:12px 14px;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--wh);font-size:15px;outline:none}
.edit-row button{padding:12px 20px;background:var(--em);border:none;border-radius:var(--rs);font-size:14px;font-weight:700;color:var(--bg);cursor:pointer}

/* Buttons */
.btn{margin:20px;padding:18px;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.4}
.btn-em{background:var(--em);color:var(--bg)}.btn-am{background:var(--am);color:var(--bg)}.btn-ghost{background:var(--sf2);color:var(--gr)}
.btn-breathe{animation:breathe 3s ease infinite}

/* Tab bar */
.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(5,10,18,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--bd);display:flex;padding:6px 0 var(--sb);z-index:90}
.tabs.hide{display:none}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;cursor:pointer;color:var(--mu);font-size:10px;font-weight:500;transition:color .2s}
.tab.on{color:var(--em)}.tab .i{font-size:22px}

/* Toast */
.toast{position:fixed;top:calc(var(--st) + 8px);left:12px;right:12px;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);padding:14px 18px;display:flex;align-items:center;gap:12px;z-index:200;transform:translateY(-120%);transition:transform .35s ease}
.toast.show{transform:translateY(0)}
.toast-i{font-size:20px}.toast-t{flex:1}.toast-t .t1{font-size:14px;font-weight:600}.toast-t .t2{font-size:12px;color:var(--gr)}

/* Misc */
.spin{width:40px;height:40px;border:3px solid var(--bd2);border-top-color:var(--em);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;gap:18px}
.loading .msg{color:var(--gr);font-size:14px}
.empty{text-align:center;padding:56px 32px}
.empty .ei{font-size:48px;margin-bottom:14px}.empty .et{font-size:18px;font-weight:600;margin-bottom:6px}.empty .es{font-size:14px;color:var(--gr);line-height:1.5}
.app-foot{text-align:center;padding:28px 20px 44px;font-size:11px;color:var(--mu)}

/* Floating order pill */
.order-pill{position:fixed;bottom:calc(76px + var(--sb) + 8px);left:16px;right:16px;background:var(--sf2);border:1px solid var(--em);border-radius:var(--r);padding:14px 18px;display:none;align-items:center;gap:12px;z-index:85;cursor:pointer;animation:glow 2s infinite}
.order-pill.show{display:flex}
.order-pill .op-dot{width:8px;height:8px;border-radius:50%;background:var(--em);animation:pulse 1.5s infinite}
.order-pill .op-txt{flex:1;font-size:13px;font-weight:600}
.order-pill .op-amt{font-size:15px;font-weight:700;color:var(--em)}

/* ═══════════════════════════════════════════════════════════════════
   v4 PREMIUM UPGRADE — brand wordmark, glass cards, gradient buttons,
   premium home sheet, demand map, route map
   ═══════════════════════════════════════════════════════════════════ */

/* Wordmark — LOCKED brand treatment: "Cash" upright white, "Flow" italic emerald */
.wm{font-family:'Instrument Serif',Georgia,serif;font-weight:400;letter-spacing:-.035em;line-height:1;display:inline-block}
.wm .c{color:var(--wh);font-style:normal}
.wm .f{color:var(--em);font-style:italic;margin-left:-.03em}
.wm-mark{font-family:'Instrument Serif',Georgia,serif;font-style:italic;color:var(--em);font-weight:400;line-height:1;letter-spacing:-.04em}
/* Override old splash/auth "g" accent to use Instrument Serif — lock to brand */
.splash-logo,.a-logo{font-family:'Instrument Serif',Georgia,serif;font-weight:400;letter-spacing:-.035em}
.splash-logo .w,.a-logo .w{font-style:normal;color:var(--wh)}
.splash-logo .g,.a-logo .g{font-style:italic;background:none;-webkit-text-fill-color:var(--em);color:var(--em);margin-left:-.03em}

/* Glassmorphism primitives — subtle blur + gradient border */
.glass{background:linear-gradient(180deg,rgba(255,255,255,.035) 0%,rgba(255,255,255,.015) 100%);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);position:relative;overflow:hidden}
.glass::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:1px;background:linear-gradient(135deg,rgba(255,255,255,.14),rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,.06));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
/* Upgrade baseline .card to glass */
.card{background:linear-gradient(180deg,rgba(11,18,33,.78) 0%,rgba(8,14,25,.64) 100%);backdrop-filter:blur(14px) saturate(130%);-webkit-backdrop-filter:blur(14px) saturate(130%);border:1px solid rgba(255,255,255,.07);box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 8px 24px rgba(0,0,0,.25)}
.cour-set,.fees,.pay-card,.verify-card,.stat-card,.earn-hero,.toggle-row,.inc-card{backdrop-filter:blur(14px) saturate(130%);-webkit-backdrop-filter:blur(14px) saturate(130%);background:linear-gradient(180deg,rgba(11,18,33,.78) 0%,rgba(8,14,25,.62) 100%);box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 8px 24px rgba(0,0,0,.22)}

/* Gradient buttons — replace flat fills with depth */
.btn-em{background:linear-gradient(135deg,#00E8B8 0%,#00C9A0 55%,#00A88B 100%);color:#05110D;box-shadow:0 8px 22px rgba(0,232,184,.28),0 1px 0 rgba(255,255,255,.18) inset,0 -1px 0 rgba(0,0,0,.15) inset;font-weight:800;letter-spacing:.01em}
.btn-em:active{box-shadow:0 4px 12px rgba(0,232,184,.22),0 1px 0 rgba(255,255,255,.15) inset}
.btn-am{background:var(--cour-grad);color:var(--cour-ink);box-shadow:0 8px 22px var(--cour-glow),0 1px 0 rgba(255,255,255,.22) inset,0 -1px 0 rgba(0,0,0,.12) inset;font-weight:800;letter-spacing:.01em;position:relative;overflow:hidden}
.btn-am:active{box-shadow:0 4px 12px var(--cour-glow),0 1px 0 rgba(255,255,255,.18) inset}
.btn-ghost{background:linear-gradient(180deg,rgba(22,34,54,.7),rgba(17,29,46,.7));color:var(--wh);border:1px solid var(--bd2);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
/* Apply matching treatment to the legacy .a-btn primary CTA */
.a-btn{background:linear-gradient(135deg,#00E8B8 0%,#00C9A0 55%,#00A88B 100%);color:#05110D;box-shadow:0 8px 22px rgba(0,232,184,.28),0 1px 0 rgba(255,255,255,.18) inset;font-weight:800}
.a-btn.a-btn2{background:linear-gradient(180deg,rgba(22,34,54,.7),rgba(17,29,46,.7));color:var(--gr);box-shadow:none;border:1px solid var(--bd2);font-weight:600}
.inc-accept{background:var(--cour-grad)!important;color:var(--cour-ink)!important;box-shadow:0 6px 18px var(--cour-glow),0 1px 0 rgba(255,255,255,.22) inset}

/* PREMIUM HOME SHEET — hero + elevated role cards with wordmark logos */
.home-hero{position:relative;padding:calc(var(--st) + 24px) 20px 18px;overflow:hidden}
.home-hero::before{content:'';position:absolute;top:-120px;left:-80px;width:420px;height:420px;background:radial-gradient(circle,rgba(0,232,184,.14) 0%,rgba(0,232,184,.04) 40%,transparent 70%);pointer-events:none;filter:blur(8px)}
.home-hero::after{content:'';position:absolute;top:-60px;right:-120px;width:340px;height:340px;background:radial-gradient(circle,rgba(255,184,0,.08) 0%,transparent 65%);pointer-events:none}
.home-hero-inner{position:relative;z-index:1;display:flex;align-items:flex-start;justify-content:space-between}
.home-greet{font-size:13px;color:var(--gr);letter-spacing:.02em;text-transform:uppercase;font-weight:600}
.home-name{font-size:32px;font-weight:800;margin-top:4px;letter-spacing:-.02em;line-height:1.1}
.home-sub{font-size:14px;color:var(--gr);margin-top:6px}
.home-av{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,rgba(0,232,184,.18),rgba(0,232,184,.06));display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;color:var(--em);cursor:pointer;border:1.5px solid rgba(0,232,184,.3);box-shadow:0 4px 12px rgba(0,232,184,.15)}

/* Premium role cards — with white/emerald wordmark logos */
.roles-premium{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:18px 20px 0}
.rp{position:relative;padding:22px 18px 20px;border-radius:20px;cursor:pointer;transition:transform .25s cubic-bezier(.2,.8,.2,1),box-shadow .25s;background:linear-gradient(180deg,rgba(11,18,33,.88) 0%,rgba(8,14,25,.72) 100%);border:1px solid rgba(255,255,255,.07);overflow:hidden;min-height:200px;display:flex;flex-direction:column;justify-content:space-between;backdrop-filter:blur(14px) saturate(130%);-webkit-backdrop-filter:blur(14px) saturate(130%);box-shadow:0 10px 28px rgba(0,0,0,.35),0 1px 0 rgba(255,255,255,.05) inset}
.rp:active{transform:translateY(1px) scale(.985)}
.rp::before{content:'';position:absolute;inset:0;border-radius:inherit;opacity:.6;pointer-events:none}
.rp.get::before{background:radial-gradient(ellipse at 80% 120%,rgba(0,232,184,.22) 0%,transparent 55%)}
.rp.del::before{background:radial-gradient(ellipse at 80% 120%,rgba(255,184,0,.18) 0%,transparent 55%)}
.rp::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.18) 50%,transparent 100%);pointer-events:none}
.rp-logo{position:relative;z-index:1;display:flex;align-items:center;gap:6px;margin-bottom:auto}
.rp-logo .wm{font-size:22px}
.rp-chip{position:absolute;top:18px;right:16px;z-index:2;padding:3px 9px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.rp.get .rp-chip{background:rgba(0,232,184,.12);color:var(--em);border:1px solid rgba(0,232,184,.25)}
.rp.del .rp-chip{background:rgba(255,184,0,.12);color:var(--am);border:1px solid rgba(255,184,0,.28)}
.rp-body{position:relative;z-index:1;margin-top:26px}
.rp-t{font-size:20px;font-weight:800;letter-spacing:-.01em}
.rp-s{font-size:13px;color:var(--gr);margin-top:3px;line-height:1.4}
.rp-arrow{position:relative;z-index:1;margin-top:14px;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.rp.get .rp-arrow{color:var(--em)}
.rp.del .rp-arrow{color:var(--am)}
.rp-arrow .rp-ico{font-size:16px;transition:transform .25s}
.rp:active .rp-ico{transform:translateX(4px)}

/* Live status bar — premium version of .conn */
.live-bar{display:flex;align-items:center;gap:10px;margin:16px 20px 0;padding:14px 16px;border-radius:14px;background:linear-gradient(90deg,rgba(0,232,184,.08) 0%,rgba(0,232,184,.02) 100%);border:1px solid rgba(0,232,184,.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.live-bar .lb-dot{width:8px;height:8px;border-radius:50%;background:var(--em);box-shadow:0 0 0 4px rgba(0,232,184,.15);animation:pulse 1.8s infinite}
.live-bar .lb-t{flex:1;font-size:13px;font-weight:600}
.live-bar .lb-t span{color:var(--gr);font-weight:400}
.live-bar .lb-r{font-size:11px;color:var(--em);font-weight:700;letter-spacing:.05em;text-transform:uppercase}

/* Quick-stats strip under role cards */
.qstats{display:flex;gap:10px;padding:16px 20px 4px}
.qstat{flex:1;padding:12px 10px;border-radius:14px;background:linear-gradient(180deg,rgba(11,18,33,.6),rgba(8,14,25,.45));border:1px solid rgba(255,255,255,.05);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);text-align:center}
.qstat .qv{font-size:17px;font-weight:800;letter-spacing:-.01em}
.qstat .qv.em{color:var(--em)}.qstat .qv.am{color:var(--am)}
.qstat .ql{font-size:10px;color:var(--mu);margin-top:2px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}

/* Demand map overlay legend (for courier dash) */
.map-wrap{position:relative;margin:16px 20px 0;border-radius:var(--r);overflow:hidden;border:1px solid var(--bd)}
.map-wrap .map-c{margin:0;border:none;border-radius:0}
.map-legend{position:absolute;top:12px;left:12px;background:rgba(5,10,18,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 12px;z-index:5}
.map-legend .ml-t{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:6px}
.map-legend .ml-r{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--wh);margin-top:4px}
.map-legend .ml-d{width:10px;height:10px;border-radius:50%}
.map-badge{position:absolute;top:12px;right:12px;background:rgba(5,10,18,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,184,0,.3);border-radius:20px;padding:6px 12px;font-size:11px;font-weight:700;color:var(--am);z-index:5;display:flex;align-items:center;gap:6px}
.map-badge .mb-dot{width:6px;height:6px;border-radius:50%;background:var(--am);animation:pulse 1.5s infinite}

/* Pulsing hotspot marker (DOM marker injected by initMapEl) */
.hot-marker{width:22px;height:22px;border-radius:50%;background:rgba(255,184,0,.92);box-shadow:0 0 0 8px rgba(255,184,0,.2),0 0 0 16px rgba(255,184,0,.08);animation:hotPulse 2s infinite;pointer-events:none}
.hot-marker.em{background:rgba(0,232,184,.92);box-shadow:0 0 0 8px rgba(0,232,184,.2),0 0 0 16px rgba(0,232,184,.08)}
@keyframes hotPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.22);opacity:.72}}

/* ETA chip over the map */
.eta-chip{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(5,10,18,.86);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:10px 18px;display:flex;align-items:center;gap:12px;z-index:5;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.eta-chip .ec-v{font-size:18px;font-weight:800;color:var(--em);letter-spacing:-.02em}
.eta-chip .ec-l{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;font-weight:700}
.eta-chip .ec-sep{width:1px;height:24px;background:var(--bd2)}

/* Recent activity row on home */
.recent-row{padding:20px}
.recent-row h3{font-size:13px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.rr-empty{padding:20px;border-radius:14px;background:linear-gradient(180deg,rgba(11,18,33,.5),rgba(8,14,25,.3));border:1px dashed rgba(255,255,255,.07);text-align:center;font-size:13px;color:var(--mu)}

/* ─── FEE MODEL UI — speed toggle, ruler, tick marks ───────────────── */


/* Fee breakdown card — upgrade to clear line items */
.fees{padding:16px 18px}
.fee-r{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:14px}
.fee-r .l{color:var(--gr);display:flex;align-items:center;gap:6px}
.fee-r .l .hint{font-size:10px;color:var(--mu);font-weight:500;padding:2px 6px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05)}
.fee-r .v{font-weight:600;color:var(--wh);font-variant-numeric:tabular-nums}
.fee-r.tot{border-top:1px solid var(--bd2);padding-top:14px;margin-top:6px;font-size:17px}
.fee-r.tot .v{font-size:19px;font-weight:800;letter-spacing:-.01em}
.fee-r.est .v{color:var(--am)}
.fee-r.est .l::after{content:'estimate';font-size:9px;font-weight:700;color:var(--am);background:rgba(255,184,0,.12);border:1px solid rgba(255,184,0,.25);padding:2px 6px;border-radius:6px;margin-left:4px;letter-spacing:.06em;text-transform:uppercase}

/* Toggle to expand fee breakdown detail */
.fee-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0 4px;cursor:pointer;user-select:none;border-bottom:1px dashed rgba(255,255,255,.06);margin-bottom:4px}
.fee-toggle .ft-t{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.fee-toggle .ft-chev{font-size:12px;color:var(--gr);transition:transform .25s}
.fee-toggle.on .ft-chev{transform:rotate(180deg)}
.fee-detail{max-height:0;overflow:hidden;transition:max-height .3s ease, opacity .2s;opacity:0}
.fee-detail.on{max-height:280px;opacity:1}

/* Visual "ruler" — stacked horizontal bar showing fee composition */
.fee-ruler{margin:14px 0 4px}
.fee-ruler-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;background:var(--sf3);box-shadow:0 1px 2px rgba(0,0,0,.3) inset}
.fee-ruler-seg{height:100%;position:relative;transition:width .3s}
.fr-cash{background:linear-gradient(90deg,#00E8B8,#00C9A0)}
.fr-del{background:linear-gradient(90deg,#6C8CFF,#4A6FDD)}
.fr-txn{background:linear-gradient(90deg,#8A9BB0,#5A6D82)}
.fr-cour{background:linear-gradient(90deg,#FFB800,#E09C00)}
.fee-ruler-legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:10px}
.fr-leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gr)}
.fr-leg .frd{width:8px;height:8px;border-radius:2px}
.fr-leg b{color:var(--wh);font-weight:600;font-variant-numeric:tabular-nums}

/* Courier fee ruler (slider with tick marks) — upgraded slider */
.ruler-wrap{position:relative;padding:22px 8px 30px 8px;margin-top:6px}
.ruler-track{position:absolute;left:8px;right:8px;top:30px;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--em) 0%,var(--am) 50%,var(--rd) 100%);opacity:.35;pointer-events:none}
.ruler-ticks{position:absolute;left:8px;right:8px;top:0;height:30px;pointer-events:none}
.ruler-tick{position:absolute;top:14px;width:1px;height:8px;background:rgba(255,255,255,.22);transform:translateX(-.5px)}
.ruler-tick.major{height:14px;top:8px;background:rgba(255,255,255,.45);width:2px;transform:translateX(-1px)}
.ruler-tick-lbl{position:absolute;top:0;font-size:9px;color:var(--mu);font-weight:700;transform:translateX(-50%);letter-spacing:.04em}
.ruler-slider{position:relative;width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:transparent;outline:none;cursor:pointer;z-index:2}
.ruler-slider::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--wh);border:3px solid var(--am);cursor:pointer;box-shadow:0 4px 14px rgba(255,184,0,.35),0 1px 3px rgba(0,0,0,.5);transition:transform .1s}
.ruler-slider::-webkit-slider-thumb:active{transform:scale(1.15)}
.ruler-slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--wh);border:3px solid var(--am);cursor:pointer;box-shadow:0 4px 14px rgba(255,184,0,.35)}
.ruler-readout{position:absolute;right:8px;bottom:0;font-size:12px;color:var(--mu);font-weight:600}
.ruler-readout b{color:var(--am);font-size:13px;font-weight:800}

/* Anchor pill row under the ruler (quick-select fee values) */
.ruler-anchors{display:flex;gap:6px;margin-top:6px}
.ruler-anchor{flex:1;padding:8px 4px;text-align:center;font-size:12px;font-weight:700;color:var(--gr);background:linear-gradient(180deg,rgba(11,18,33,.5),rgba(8,14,25,.3));border:1px solid var(--bd2);border-radius:10px;cursor:pointer;transition:all .2s}
.ruler-anchor.on{color:var(--am);border-color:rgba(255,184,0,.35);background:rgba(255,184,0,.08);box-shadow:0 0 0 1px rgba(255,184,0,.2)}
.ruler-anchor:active{transform:scale(.96)}

/* ─── HOME LIVE ACTIVITY MAP ─────────────────────────────────────── */
.home-map{position:relative;margin:14px 20px 0;height:220px;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.07);box-shadow:0 10px 28px rgba(0,0,0,.35)}
.home-map .map-c{margin:0;border:none;border-radius:0;height:100%}
.home-map-overlay{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(5,10,18,0) 40%,rgba(5,10,18,.6) 100%)}
.home-map-stats{position:absolute;bottom:12px;left:12px;right:12px;display:flex;gap:8px;z-index:5;pointer-events:none}
.hms{flex:1;padding:8px 10px;border-radius:10px;background:rgba(5,10,18,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:8px;pointer-events:auto}
.hms .hms-d{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hms .hms-d.em{background:var(--am);box-shadow:0 0 0 3px rgba(255,184,0,.2)}
.hms .hms-d.cp{background:var(--em);box-shadow:0 0 0 3px rgba(0,232,184,.2)}
.hms .hms-t{font-size:11px;font-weight:700;color:var(--wh);line-height:1.1}
.hms .hms-t span{display:block;font-size:10px;color:var(--mu);font-weight:500;margin-top:1px}

/* Home activity map title row */
.home-sec-title{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0}
.home-sec-title h3{font-size:13px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em}
.home-sec-title .hst-link{font-size:12px;color:var(--em);font-weight:700;cursor:pointer}

/* CashPoint cards on home / request */
.cp-list{padding:10px 20px 0;display:flex;flex-direction:column;gap:10px}
.cp-card{display:flex;align-items:center;gap:14px;padding:14px;background:linear-gradient(180deg,rgba(11,18,33,.78),rgba(8,14,25,.62));border:1px solid rgba(255,255,255,.07);border-radius:14px;cursor:pointer;transition:all .2s;backdrop-filter:blur(12px) saturate(130%);-webkit-backdrop-filter:blur(12px) saturate(130%)}
.cp-card:active{transform:scale(.99);border-color:rgba(0,232,184,.3)}
.cp-card.on{border-color:var(--em);background:linear-gradient(180deg,rgba(0,232,184,.08),rgba(0,232,184,.02))}
.cp-ico{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,rgba(0,232,184,.18),rgba(0,232,184,.06));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid rgba(0,232,184,.2)}
.cp-body{flex:1;min-width:0}
.cp-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.cp-open{font-size:9px;font-weight:800;color:var(--em);padding:2px 6px;border-radius:6px;background:rgba(0,232,184,.12);border:1px solid rgba(0,232,184,.25);letter-spacing:.06em}
.cp-closed{font-size:9px;font-weight:800;color:var(--rd);padding:2px 6px;border-radius:6px;background:rgba(255,77,106,.1);border:1px solid rgba(255,77,106,.25);letter-spacing:.06em}
.cp-addr{font-size:12px;color:var(--gr);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cp-meta{font-size:11px;color:var(--mu);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.cp-right{text-align:right;flex-shrink:0}
.cp-right .cp-fee{font-size:13px;font-weight:700;color:var(--am)}
.cp-right .cp-dist{font-size:11px;color:var(--mu);margin-top:2px}

/* Delivery vs Pickup mode toggle (top of request screen) */
.mode-toggle{display:flex;gap:6px;padding:4px;margin:0 20px 16px;border-radius:14px;background:linear-gradient(180deg,rgba(8,14,25,.7),rgba(11,18,33,.5));border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.mode-opt{flex:1;padding:12px 10px;border-radius:10px;cursor:pointer;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
.mode-opt.on{background:linear-gradient(180deg,rgba(0,232,184,.16),rgba(0,232,184,.06));box-shadow:0 0 0 1px rgba(0,232,184,.3),0 4px 14px rgba(0,232,184,.12) inset}
.mode-opt:active{transform:scale(.98)}
.mode-opt .mo-i{font-size:20px;line-height:1}
.mode-opt .mo-t{font-size:13px;font-weight:700;margin-top:4px}
.mode-opt.on .mo-t{color:var(--em)}
.mode-opt .mo-s{font-size:10px;color:var(--mu);font-weight:500;margin-top:1px}

/* ─── UBER-STYLE HOME — full-bleed map + bottom sheet ──────────────── */
.home-v2{position:absolute;inset:0;overflow:hidden;padding-bottom:0 !important}
.home-map-full{position:absolute;inset:0;z-index:0}
.home-map-full > div{width:100%;height:100%}
.home-map-full::after{content:'';position:absolute;top:0;left:0;right:0;height:140px;background:linear-gradient(180deg,rgba(5,10,18,.55) 0%,rgba(5,10,18,0) 100%);pointer-events:none;z-index:1}

/* Floating top chrome */
.home-top{position:absolute;top:calc(var(--st) + 14px);left:16px;right:16px;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:10px;pointer-events:none}
.home-top > *{pointer-events:auto}
.home-top-greet{padding:8px 14px 8px 8px;background:rgba(5,10,18,.72);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);border-radius:40px;display:flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.09);cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.4)}
.home-top-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,rgba(0,232,184,.32),rgba(0,232,184,.08));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--em);border:1px solid rgba(0,232,184,.35);flex-shrink:0}
.home-top-meta{display:flex;flex-direction:column;justify-content:center;min-width:0}
.htm-g{font-size:9px;color:var(--mu);font-weight:700;line-height:1;text-transform:uppercase;letter-spacing:.08em}
.htm-n{font-size:13px;font-weight:700;line-height:1.2;margin-top:2px;white-space:nowrap;text-overflow:ellipsis;overflow:hidden;max-width:120px}
.home-top-logo{padding:10px 16px;background:rgba(5,10,18,.72);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);border-radius:40px;border:1px solid rgba(255,255,255,.09);box-shadow:0 4px 14px rgba(0,0,0,.4)}
.home-top-logo .wm{font-size:18px}

.home-supply{position:absolute;top:calc(var(--st) + 74px);left:50%;transform:translateX(-50%);padding:7px 14px;background:rgba(5,10,18,.82);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);border-radius:20px;border:1px solid rgba(0,232,184,.25);z-index:9;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--wh);box-shadow:0 4px 14px rgba(0,0,0,.4);white-space:nowrap}
.home-supply .hs-d{width:6px;height:6px;border-radius:50%;background:var(--em);animation:pulse 1.8s infinite;box-shadow:0 0 0 3px rgba(0,232,184,.2)}
.home-supply b{font-weight:800}

/* Map markers */
.m-courier{width:16px;height:16px;border-radius:50%;background:var(--am);border:2.5px solid #050A12;box-shadow:0 2px 8px rgba(0,0,0,.5),0 0 0 4px rgba(255,184,0,.2);cursor:pointer}
.m-cashpoint{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#00E8B8,#00C9A0);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;box-shadow:0 4px 12px rgba(0,232,184,.35),0 0 0 3px rgba(5,10,18,.6);border:1.5px solid #050A12}
.m-user{width:20px;height:20px;border-radius:50%;background:var(--em);border:3px solid #050A12;box-shadow:0 0 0 6px rgba(0,232,184,.18),0 0 0 12px rgba(0,232,184,.08),0 2px 10px rgba(0,232,184,.4);animation:hotPulse 2.4s infinite}

/* Floating re-center FAB */
.home-fab{position:absolute;right:16px;bottom:calc(340px + var(--sb));width:44px;height:44px;border-radius:50%;background:rgba(5,10,18,.86);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.1);z-index:9;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.4);transition:bottom .4s cubic-bezier(.2,.8,.2,1);color:var(--em)}
.home-fab:active{transform:scale(.92)}

/* Bottom sheet */
.sheet{position:absolute;bottom:calc(76px + var(--sb));left:0;right:0;background:linear-gradient(180deg,rgba(8,14,25,.94) 0%,rgba(5,10,18,.98) 100%);backdrop-filter:blur(28px) saturate(140%);-webkit-backdrop-filter:blur(28px) saturate(140%);border-top:1px solid rgba(255,255,255,.09);border-radius:24px 24px 0 0;z-index:8;display:flex;flex-direction:column;transition:height .4s cubic-bezier(.2,.8,.2,1);box-shadow:0 -8px 32px rgba(0,0,0,.5);height:340px;overflow:hidden}
.sheet.expanded{height:calc(100vh - var(--st) - 160px)}
.sheet-handle{display:flex;justify-content:center;padding:10px 0 6px;cursor:pointer;flex-shrink:0}
.sheet-handle::after{content:'';width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.22);transition:background .2s}
.sheet-handle:active::after{background:rgba(255,255,255,.45)}
.sheet-body{flex:1;overflow-y:auto;padding:2px 18px 18px;-webkit-overflow-scrolling:touch}

/* Dual action tiles */
.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sa{padding:14px 14px 12px;border-radius:16px;cursor:pointer;border:1px solid rgba(255,255,255,.08);position:relative;overflow:hidden;transition:transform .15s}
.sa:active{transform:scale(.97)}
.sa.get{background:linear-gradient(135deg,rgba(0,232,184,.22),rgba(0,232,184,.06))}
.sa.give{background:linear-gradient(135deg,rgba(255,184,0,.18),rgba(255,184,0,.05))}
.sa .sa-i{font-size:22px;line-height:1}
.sa .sa-t{font-size:15px;font-weight:800;margin-top:8px;letter-spacing:-.01em}
.sa.get .sa-t{color:var(--em)}
.sa.give .sa-t{color:var(--am)}
.sa .sa-s{font-size:11px;color:var(--gr);margin-top:2px}
.sa .sa-arrow{position:absolute;top:14px;right:14px;font-size:14px;opacity:.5}

.sheet-sec{display:flex;align-items:center;justify-content:space-between;margin:14px 0 10px}
.sheet-sec h4{font-size:11px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.08em}
.sheet-sec .sheet-link{font-size:12px;color:var(--em);font-weight:700;cursor:pointer}

/* ─── REQUEST-SCREEN LIVE SUPPLY MAP ──────────────────────────────── */
.req-map-wrap{position:relative;margin:4px 20px 0;height:240px;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.08);box-shadow:0 8px 24px rgba(0,0,0,.35)}
.req-map{position:absolute;inset:0}
.req-map > div{width:100%;height:100%}
.req-map-legend{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:6px;padding:6px 11px;background:rgba(5,10,18,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.08);border-radius:14px;font-size:10px;color:var(--wh);font-weight:600;z-index:5}
.req-map-legend .rml-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.req-map-legend span{margin-right:4px}
.req-map-badge{position:absolute;top:10px;right:10px;padding:6px 11px;background:rgba(5,10,18,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(0,232,184,.25);border-radius:14px;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--em);z-index:5}
.req-map-badge .rmb-dot{width:6px;height:6px;border-radius:50%;background:var(--em);animation:pulse 1.8s infinite;box-shadow:0 0 0 3px rgba(0,232,184,.18)}
.req-map-fab{position:absolute;bottom:10px;right:10px;width:36px;height:36px;border-radius:50%;background:rgba(5,10,18,.86);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;color:var(--em);z-index:5;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.req-map-fab:active{transform:scale(.9)}

/* ─── COURIER LIVE MAP — pulsing request pins + incoming alert ─────── */
.cour-dash-map{position:relative;margin:12px 20px 0;height:320px;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.08);box-shadow:0 10px 28px rgba(0,0,0,.4)}
.cour-dash-map > .map-c{position:absolute;inset:0;margin:0;border:none;border-radius:0}
.cour-offline-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,10,18,.72) 0%,rgba(5,10,18,.88) 100%);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:6;padding:24px;text-align:center}
.cour-offline-overlay .coo-i{font-size:38px;margin-bottom:12px;opacity:.8}
.cour-offline-overlay .coo-t{font-size:17px;font-weight:800;margin-bottom:4px}
.cour-offline-overlay .coo-s{font-size:13px;color:var(--gr);max-width:240px;line-height:1.4}
.cour-offline-overlay button{margin-top:18px;padding:12px 24px;border:none;border-radius:12px;background:linear-gradient(135deg,#FFC83D 0%,#FFB800 55%,#E09C00 100%);color:#1A1000;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 6px 18px rgba(255,184,0,.28)}

/* Live request marker — pulsing emerald pin with £ amount inside */
.live-req{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,#00E8B8,#00C9A0);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#05110D;cursor:pointer;border:2.5px solid #050A12;box-shadow:0 6px 16px rgba(0,232,184,.45),0 0 0 4px rgba(0,232,184,.18);animation:liveReqPulse 1.8s infinite;position:relative;z-index:3;letter-spacing:-.02em}
.live-req:hover,.live-req.hot{animation:liveReqHot 1.2s infinite;box-shadow:0 8px 22px rgba(0,232,184,.55),0 0 0 6px rgba(0,232,184,.22)}
@keyframes liveReqPulse{0%,100%{transform:scale(1);box-shadow:0 6px 16px rgba(0,232,184,.45),0 0 0 4px rgba(0,232,184,.18)}50%{transform:scale(1.06);box-shadow:0 8px 22px rgba(0,232,184,.6),0 0 0 8px rgba(0,232,184,.08)}}
@keyframes liveReqHot{0%,100%{transform:scale(1.08)}50%{transform:scale(1.14)}}

/* Live request alert — slides down from top when new request arrives */

/* Online pulse indicator on the top of the map */
.cour-live-badge{position:absolute;top:12px;right:12px;padding:6px 11px;background:rgba(5,10,18,.86);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(0,232,184,.3);border-radius:14px;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--em);z-index:5}
.cour-live-badge .clb-dot{width:6px;height:6px;border-radius:50%;background:var(--em);animation:pulse 1.4s infinite;box-shadow:0 0 0 3px rgba(0,232,184,.2)}

/* Demand legend on courier dash */
.cour-demand-legend{position:absolute;bottom:12px;left:12px;padding:8px 12px;background:rgba(5,10,18,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.08);border-radius:10px;z-index:5}
.cour-demand-legend .cdl-t{font-size:9px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.cour-demand-legend .cdl-r{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--wh);margin-top:3px;font-weight:600}
.cour-demand-legend .cdl-d{width:8px;height:8px;border-radius:50%}

/* ─── TOP MODE SWITCH — the WORDMARK itself is the switch ─────────── */
.mode-switch-bar{position:absolute;top:calc(var(--st) + 14px);left:16px;right:16px;z-index:14;display:flex;align-items:center;gap:10px;pointer-events:none}
.mode-switch-bar > *{pointer-events:auto}
.ms-avatar{width:40px;height:40px;border-radius:50%;background:rgba(5,10,18,.78);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);border:1px solid rgba(255,255,255,.09);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.4);flex-shrink:0;transition:color .45s cubic-bezier(.2,.8,.2,1),border-color .45s}

/* The wordmark pill — "Cash" and "Flow" each tappable */
.mode-switch{flex:1;position:relative;padding:10px 14px;min-height:62px;border-radius:32px;background:rgba(5,10,18,.82);backdrop-filter:blur(22px) saturate(160%);-webkit-backdrop-filter:blur(22px) saturate(160%);border:1px solid rgba(255,255,255,.1);box-shadow:0 6px 22px rgba(0,0,0,.48),0 1px 0 rgba(255,255,255,.05) inset;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;overflow:visible}

/* Sliding subtle accent glow behind active word */
.ms-glow{position:absolute;top:50%;transform:translate(-50%,-50%);height:50px;width:85px;border-radius:24px;background:radial-gradient(ellipse,var(--req-glow) 0%,transparent 65%);transition:left .45s cubic-bezier(.2,.8,.2,1),background .45s;pointer-events:none;filter:blur(6px);z-index:0}
.ms-glow.cash{left:38%}
.ms-glow.flow{left:62%;background:radial-gradient(ellipse,var(--cour-glow) 0%,transparent 65%)}

/* Each word in the pill */
.ms-word{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;padding:2px 10px;cursor:pointer;position:relative;z-index:2;font-family:'Instrument Serif',Georgia,serif;font-weight:400;line-height:1;letter-spacing:-.035em;transition:opacity .42s cubic-bezier(.2,.8,.2,1),transform .42s cubic-bezier(.2,.8,.2,1)}
.ms-word .mw-main{font-size:30px;line-height:1;display:block}
.ms-word .mw-sub{font-family:'Outfit',sans-serif;font-weight:800;font-size:9px;line-height:1;letter-spacing:.14em;text-transform:uppercase;margin-top:4px;white-space:nowrap;opacity:0;transform:translateY(2px);transition:opacity .4s cubic-bezier(.2,.8,.2,1),transform .4s cubic-bezier(.2,.8,.2,1)}
.ms-word.cash .mw-main{color:#FFFFFF;font-style:normal}
.ms-word.flow .mw-main{color:var(--cour);font-style:italic;margin-left:-.08em}
.ms-word.cash .mw-sub{color:rgba(255,255,255,.85)}
.ms-word.flow .mw-sub{color:var(--cour);font-style:normal}
/* Inactive state: dim the whole word */
.ms-word.off{opacity:.32;transform:scale(.94)}
.ms-word.off .mw-sub{opacity:0}
/* Active state: full opacity, subtle drop-shadow glow */
.ms-word.on{opacity:1}
.ms-word.cash.on .mw-main{filter:drop-shadow(0 0 10px rgba(255,255,255,.5))}
.ms-word.flow.on .mw-main{filter:drop-shadow(0 0 14px var(--cour-glow))}
.ms-word.on .mw-sub{opacity:1;transform:translateY(0);transition-delay:.12s}
.ms-word:active{transform:scale(.94)}
.ms-word.on:active{transform:scale(.98)}

/* Mode-scoped accent variables — so components can reference --accent dynamically */
:root{--accent:var(--em);--accent-2:#00C9A0}
[data-mode="courier"]{--accent:var(--am);--accent-2:#E09C00}

/* Horizontal slide transition when switching modes */
@keyframes slideInFromRight{from{transform:translateX(100%);opacity:.5}to{transform:translateX(0);opacity:1}}
@keyframes slideInFromLeft{from{transform:translateX(-100%);opacity:.5}to{transform:translateX(0);opacity:1}}
.anim-slide-to-courier .scr.on{animation:slideInFromRight .24s cubic-bezier(.2,.8,.2,1) both}
.anim-slide-to-requester .scr.on{animation:slideInFromLeft .24s cubic-bezier(.2,.8,.2,1) both}

/* Theme color accent sweep — soft color wash across the viewport on switch */
.mode-flash{position:fixed;inset:0;pointer-events:none;z-index:300;opacity:0;transition:opacity .5s}
.mode-flash.on{opacity:1;animation:flashSweep .6s ease-out both}
@keyframes flashSweep{0%{background:radial-gradient(circle at var(--flash-x,50%) var(--flash-y,50%),var(--accent,#00E8B8) 0%,transparent 0%);opacity:.45}100%{background:radial-gradient(circle at var(--flash-x,50%) var(--flash-y,50%),var(--accent,#00E8B8) 0%,transparent 80%);opacity:0}}

/* Press feedback on any clickable — scale + settle */
.btn,.a-btn,.sa,.rp,.cp-card,.cour-opt,.role,.sub-role,.amt-p,.cp-p,.pay-opt,.ruler-anchor,.ra-btn,.mode-opt{transition:transform .12s cubic-bezier(.2,.8,.2,1),box-shadow .2s,opacity .2s}
.btn:active,.a-btn:active,.sa:active,.rp:active,.cp-card:active,.cour-opt:active,.role:active,.sub-role:active,.amt-p:active:active,.cp-p:active,.pay-opt:active,.ruler-anchor:active,.ra-btn:active,.mode-opt:active{transform:scale(.97)}

/* Shimmer for loading states */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shimmer{background:linear-gradient(90deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 100%);background-size:200% 100%;animation:shimmer 1.4s linear infinite;border-radius:8px}

/* Counter number roll — used on big stats */
.num-roll{font-variant-numeric:tabular-nums;display:inline-block}

/* Hide the old home-top/home-top-greet/home-top-logo/home-supply when new mode switch is active */
.home-v2 .home-top,.home-v2 .home-supply{display:none !important}

/* ─── SECTION THEME SWAP — cash/white vs flow/green ──────────────── */
/* Primary CTA button — reuses --accent-* vars so it auto-themes */
.btn-em{background:var(--accent-grad);color:var(--accent-ink);box-shadow:0 8px 22px var(--accent-glow),0 1px 0 rgba(255,255,255,.22) inset,0 -1px 0 rgba(0,0,0,.12) inset;position:relative;overflow:hidden}
.btn-em:active{box-shadow:0 4px 12px var(--accent-glow),0 1px 0 rgba(255,255,255,.18) inset}
.a-btn{background:var(--accent-grad);color:var(--accent-ink);box-shadow:0 8px 22px var(--accent-glow),0 1px 0 rgba(255,255,255,.22) inset;position:relative;overflow:hidden}
.btn-breathe{animation:breatheAccent 3s ease infinite}
@keyframes breatheAccent{0%,100%{transform:scale(1);box-shadow:0 8px 22px var(--accent-glow)}50%{transform:scale(1.02);box-shadow:0 14px 32px var(--accent-glow)}}

/* Accent tint across inputs/toggles/pickers */
.amt-p:active,.amt-p.on{border-color:var(--accent);color:var(--accent);background:var(--accent-tint)}
.mode-opt.on .mo-t{color:var(--accent)}
.po-r.sel{border-color:var(--accent);background:var(--accent)}
.po-r.sel::after{background:var(--bg)}
.a-inp:focus{border-color:var(--accent)}
.a-dig:focus{border-color:var(--accent);background:var(--sf2);caret-color:var(--accent)}
.a-sent{color:var(--accent)}

/* Home role cards — Get Cash = white, Supply = green regardless of active mode */
.rp.get::before{background:radial-gradient(ellipse at 80% 120%,var(--req-tint) 0%,transparent 55%)}
.rp.del::before{background:radial-gradient(ellipse at 80% 120%,var(--cour-tint) 0%,transparent 55%)}
.rp.get .rp-chip{background:var(--req-tint);color:var(--req);border:1px solid var(--req-border)}
.rp.del .rp-chip{background:var(--cour-tint);color:var(--cour);border:1px solid var(--cour-border)}
.rp.get .rp-arrow{color:var(--req)}
.rp.del .rp-arrow{color:var(--cour)}

/* Sheet action tiles */
.sa.get{background:linear-gradient(135deg,var(--req-tint),var(--req-tint-2));border:1px solid var(--req-border)}
.sa.give{background:linear-gradient(135deg,var(--cour-tint),var(--cour-tint-2));border:1px solid var(--cour-border)}
.sa.get .sa-t{color:var(--req)}
.sa.give .sa-t{color:var(--cour)}

/* Quick-stats color classes remap */
.qstat .qv.em{color:var(--req)}
.qstat .qv.am{color:var(--cour)}

/* Live bar, supply pill */
.live-bar{background:linear-gradient(90deg,var(--accent-tint) 0%,var(--accent-tint-2) 100%);border:1px solid var(--accent-border)}
.live-bar .lb-dot{background:var(--accent);box-shadow:0 0 0 4px var(--accent-tint)}
.live-bar .lb-r{color:var(--accent)}
.home-supply{border:1px solid var(--accent-border)}
.home-supply .hs-d{background:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}

/* Toggle rows + avatar/verification/header */
.toggle-track.on{background:var(--accent)}
.prof-av{background:var(--accent-tint);color:var(--accent);border-color:var(--accent)}
.prof-ver{background:var(--accent-tint);color:var(--accent)}
.hdr-av{background:var(--accent-tint);color:var(--accent);border-color:var(--accent-border)}
.tab.on{color:var(--accent)}

/* Order pill + status badge */
.order-pill{border:1px solid var(--accent)}
.order-pill .op-dot{background:var(--accent)}
.order-pill .op-amt{color:var(--accent)}
.stat-badge.active{background:var(--accent-tint);color:var(--accent)}

/* Verify checkmark */
.verify-cb.checked{background:var(--accent);border-color:var(--accent)}
.verify-cb.checked::after{color:var(--accent-ink)}

/* Earnings big value */
.earn-val{color:var(--accent)}

/* MAP MARKERS — user follows active mode; courier markers are always emerald (Flow) */
.m-user{background:var(--accent);box-shadow:0 0 0 6px var(--accent-tint),0 0 0 12px var(--accent-tint-2),0 2px 10px var(--accent-glow)}
.m-courier{background:var(--cour);box-shadow:0 2px 8px rgba(0,0,0,.5),0 0 0 4px var(--cour-tint)}
/* Demand heatmap stays amber→red = universal "heat" data-viz semantic */

/* REQUESTER-MODE WHITE BUTTON POLISH — metallic shine layer */
[data-mode="requester"] .btn-em::before,
[data-mode="requester"] .a-btn::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.55) 0%,rgba(255,255,255,0) 35%,rgba(0,0,0,.04) 100%);pointer-events:none}

/* ─── HOME SHEET QUICK ACTION — replaces dual role cards ─────────── */
.home-quick{margin:0 0 8px;padding:14px;border-radius:18px;background:linear-gradient(180deg,rgba(11,18,33,.6),rgba(8,14,25,.35));border:1px solid rgba(255,255,255,.06)}
.hq-label{font-size:11px;color:var(--mu);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.hq-amts{display:flex;gap:6px;margin-bottom:12px}
.hq-amt{flex:1;padding:11px 4px;text-align:center;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;font-size:14px;font-weight:800;color:var(--wh);cursor:pointer;transition:all .2s;font-variant-numeric:tabular-nums}
.hq-amt:active{transform:scale(.95)}
.hq-amt.on{border-color:var(--accent);color:var(--accent);background:var(--accent-tint);box-shadow:0 0 0 1px var(--accent-border)}
.hq-cta{margin:0;width:100%;padding:14px;font-size:15px;border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:800}

/* Fulfillment-first choice cards — pick Delivery vs Pickup before amount */
.hq-fulfill{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.hqf{padding:12px 12px 10px;border-radius:14px;cursor:pointer;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.06);transition:all .22s cubic-bezier(.2,.8,.2,1);position:relative;overflow:hidden}
.hqf:active{transform:scale(.98)}
.hqf::before{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(ellipse at 70% 130%,var(--accent-tint) 0%,transparent 60%);opacity:0;transition:opacity .3s;pointer-events:none}
.hqf.on::before{opacity:1}
.hqf.on{border-color:var(--accent);background:var(--accent-tint-2);box-shadow:0 0 0 1px var(--accent-border),0 4px 14px var(--accent-glow)}
.hqf-i{font-size:22px;line-height:1;margin-bottom:6px;position:relative;z-index:1}
.hqf-t{font-size:14px;font-weight:800;letter-spacing:-.01em;position:relative;z-index:1;color:var(--wh)}
.hqf.on .hqf-t{color:var(--accent)}
.hqf-s{font-size:11px;color:var(--gr);margin-top:1px;position:relative;z-index:1}
.hqf-meta{font-size:10px;color:var(--mu);margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.06);font-weight:600;letter-spacing:.02em;position:relative;z-index:1}
.hqf.on .hqf-meta{color:var(--accent);opacity:.7;border-top-color:var(--accent-border)}

/* Amount row fade-up when fulfillment mode is picked */
.hq-amt-row{animation:fadeUpSmall .35s cubic-bezier(.2,.8,.2,1) both}
@keyframes fadeUpSmall{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Request sheet — flow context pill at top */
.flow-pill{display:flex;align-items:center;gap:10px;padding:10px 14px;margin:2px 0 14px;border-radius:12px;background:var(--accent-tint);border:1px solid var(--accent-border)}
.flow-pill .fp-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.8s infinite;box-shadow:0 0 0 3px var(--accent-tint-2)}
.flow-pill .fp-t{flex:1;font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.01em}
.flow-pill .fp-amt{font-size:13px;font-weight:800;color:var(--wh);font-variant-numeric:tabular-nums}

/* Address chips inside request sheet */
.chip-em{padding:8px 14px;border-radius:20px;background:var(--accent-tint);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;border:1px solid var(--accent-border)}
.chip-ghost{padding:8px 14px;border-radius:20px;background:rgba(255,255,255,.04);color:var(--gr);font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.08)}

/* ─── OFFERS REVIEW SCREEN — courier bids + final confirm ───────── */
/* Sort tabs */
.offer-sort{display:flex;gap:6px;margin:12px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.offer-sort::-webkit-scrollbar{display:none}
.os-tab{flex-shrink:0;padding:7px 14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);font-size:12px;font-weight:700;color:var(--gr);cursor:pointer;transition:all .2s;white-space:nowrap}
.os-tab:active{transform:scale(.96)}
.os-tab.on{background:var(--accent-tint);color:var(--accent);border-color:var(--accent-border);box-shadow:0 0 0 1px var(--accent-border)}

/* Offer card list */
.offer-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.offer-card{position:relative;padding:14px;border-radius:16px;background:linear-gradient(180deg,rgba(11,18,33,.78),rgba(8,14,25,.62));backdrop-filter:blur(14px) saturate(130%);-webkit-backdrop-filter:blur(14px) saturate(130%);border:1.5px solid rgba(255,255,255,.07);cursor:pointer;transition:all .22s cubic-bezier(.2,.8,.2,1);overflow:hidden}
.offer-card:active{transform:scale(.99)}
.offer-card.on{border-color:var(--accent);background:linear-gradient(180deg,var(--accent-tint) 0%,rgba(11,18,33,.78) 100%);box-shadow:0 0 0 1px var(--accent-border),0 10px 28px var(--accent-glow)}
.offer-card::before{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(ellipse at 100% 120%,var(--accent-tint) 0%,transparent 55%);opacity:0;transition:opacity .3s;pointer-events:none}
.offer-card.on::before{opacity:1}

.oc-ribbon{position:absolute;top:0;right:14px;padding:3px 10px;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;background:var(--accent-grad);color:var(--accent-ink);border-radius:0 0 8px 8px;box-shadow:0 2px 6px var(--accent-glow)}

.oc-top{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.oc-av{width:44px;height:44px;border-radius:50%;background:var(--cour-tint);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:var(--cour);border:1.5px solid var(--cour-border);flex-shrink:0}
.oc-info{flex:1;min-width:0}
.oc-name{font-size:15px;font-weight:800;letter-spacing:-.01em}
.oc-meta{font-size:11px;color:var(--gr);margin-top:2px}
.oc-price{text-align:right;flex-shrink:0}
.oc-total{font-size:19px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.oc-eta{font-size:11px;color:var(--gr);margin-top:2px;font-weight:600}

.oc-bot{display:flex;flex-direction:column;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);position:relative;z-index:1}
.oc-badges{display:flex;gap:6px;flex-wrap:wrap}
.oc-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.02em}
.oc-badge.ready{background:var(--cour-tint);color:var(--cour);border:1px solid var(--cour-border)}
.oc-badge.atm{background:rgba(255,255,255,.04);color:var(--mu);border:1px solid rgba(255,255,255,.06)}
.oc-badge.rate{background:rgba(255,255,255,.04);color:var(--gr);border:1px solid rgba(255,255,255,.06)}
.oc-breakdown{font-size:10px;color:var(--mu);font-variant-numeric:tabular-nums;letter-spacing:.01em}

/* Confirm & pay summary */
.offer-confirm{margin-top:8px;padding:16px;border-radius:18px;background:linear-gradient(180deg,var(--accent-tint-2) 0%,rgba(11,18,33,.85) 100%);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);border:1.5px solid var(--accent-border);box-shadow:0 12px 32px var(--accent-glow)}
.oc-conf-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
.oc-conf-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--mu)}
.oc-conf-amt{font-size:26px;font-weight:900;letter-spacing:-.02em;color:var(--accent);font-variant-numeric:tabular-nums}
.oc-conf-rows{display:flex;flex-direction:column;gap:6px;padding:10px 0;border-top:1px solid rgba(255,255,255,.08)}
.ocr{display:flex;justify-content:space-between;font-size:12px;color:var(--wh)}
.ocr span:first-child{color:var(--gr)}
.oc-conf-note{font-size:11px;color:var(--mu);text-align:center;margin-top:10px;line-height:1.4}

/* Empty-selection prompt */
.offer-empty-sel{margin-top:12px;padding:20px;text-align:center;border-radius:16px;background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.08)}
.offer-empty-sel .oes-i{font-size:28px;margin-bottom:6px}
.offer-empty-sel .oes-t{font-size:14px;font-weight:700;color:var(--wh)}
.offer-empty-sel .oes-s{font-size:12px;color:var(--gr);margin-top:4px}

/* ─── COURIER SETUP — supply-mode chip, cash input, preview ─────── */
.supply-hint{margin-top:10px;font-size:11px;color:var(--mu);text-align:center;font-weight:500}

.supply-chip{display:flex;align-items:center;gap:10px;padding:10px 14px;margin:0 0 14px;border-radius:14px;background:var(--cour-tint);border:1px solid var(--cour-border)}
.supply-chip .sc-i{font-size:18px}
.supply-chip .sc-t{flex:1;font-size:13px;font-weight:800;color:var(--cour);letter-spacing:-.01em}
.supply-chip .sc-change{font-size:11px;font-weight:700;color:var(--cour);cursor:pointer;padding:4px 10px;border-radius:10px;background:rgba(0,232,184,.12);border:1px solid var(--cour-border);transition:transform .1s}
.supply-chip .sc-change:active{transform:scale(.95)}

.cash-input-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.cash-input-row .cir-curr{font-size:17px;font-weight:800;color:var(--cour)}
.cash-input-row input{flex:1;padding:4px 0;background:transparent;border:none;outline:none;color:var(--wh);font-size:17px;font-weight:800;font-variant-numeric:tabular-nums}
.cash-input-row input::placeholder{color:var(--mu);font-weight:500;font-size:14px}
.cash-input-row .cir-hint{font-size:10px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.05em}

.earn-preview{margin:10px 0 12px;padding:12px 14px;border-radius:12px;background:linear-gradient(180deg,var(--cour-tint-2),rgba(11,18,33,.4));border:1px solid var(--cour-border)}
.earn-preview .ep-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;color:var(--gr)}
.earn-preview .ep-row b{color:var(--cour);font-weight:800;font-size:13px;font-variant-numeric:tabular-nums}

.online-cta-row{margin-top:6px}

.cour-setup-prompt{position:absolute;z-index:7;padding:16px 18px;border-radius:16px;background:rgba(5,10,18,.78);backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);border:1px solid rgba(255,255,255,.09);text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:fadeUpSmall .4s cubic-bezier(.2,.8,.2,1) both}
.cour-setup-prompt .csp-i{font-size:28px;margin-bottom:6px;animation:bounceDown 1.6s ease-in-out infinite}
.cour-setup-prompt .csp-t{font-size:14px;font-weight:800;letter-spacing:-.01em}
.cour-setup-prompt .csp-s{font-size:12px;color:var(--gr);margin-top:4px;line-height:1.4}
@keyframes bounceDown{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

/* ─── MATCHING SCREEN — hero spinner with countdown ───────────── */
.match-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.match-spin-wrap{position:relative;width:120px;height:120px;margin-bottom:24px}
.match-spin{position:absolute;inset:0;border:3px solid rgba(255,255,255,.06);border-top-color:var(--accent);border-radius:50%;animation:spin 1.1s linear infinite}
.match-spin-inner{position:absolute;inset:12px;background:var(--accent-tint);border:1.5px solid var(--accent-border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:var(--accent);font-family:'Instrument Serif',Georgia,serif;font-style:italic}
.match-title{font-size:19px;font-weight:800;letter-spacing:-.01em;margin-bottom:6px}
.match-sub{font-size:13px;color:var(--gr);margin-bottom:18px}
.match-countdown{font-size:12px;color:var(--mu);padding:6px 14px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.match-countdown b{color:var(--accent);font-weight:800;font-variant-numeric:tabular-nums}

/* ─── POST-DELIVERY COMBINED REVIEW ──────────────────────────── */
.review-hero{padding:24px 20px 16px;text-align:center}
.review-hero .rh-ic{font-size:46px;margin-bottom:6px;animation:fadeUpSmall .5s cubic-bezier(.2,.8,.2,1) both}
.review-hero .rh-t{font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--accent)}
.review-hero .rh-s{font-size:13px;color:var(--gr);margin-top:4px}
.review-section{position:relative;padding:18px 18px 16px;margin:0 20px 10px;transition:opacity .25s}
.review-section.dimmed{opacity:.5;pointer-events:none}
.review-section .rs-n{position:absolute;top:14px;right:16px;width:24px;height:24px;border-radius:50%;background:var(--accent-tint);color:var(--accent);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;border:1px solid var(--accent-border)}
.rs-title{font-size:15px;font-weight:800;letter-spacing:-.01em;padding-right:32px}
.rs-title .rs-opt{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-left:4px}
.rs-sub{font-size:12px;color:var(--gr);margin-top:2px}
.rate-stars{display:flex;gap:8px;justify-content:center;margin-top:14px}
.rs-star{font-size:32px;cursor:pointer;opacity:.3;transition:all .15s cubic-bezier(.2,.8,.2,1)}
.rs-star.on{opacity:1;transform:scale(1.08)}
.rs-star:active{transform:scale(1.2)}
.tip-row{display:flex;gap:6px;margin-top:12px}
.tip-chip{flex:1;padding:11px 4px;text-align:center;font-size:13px;font-weight:800;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;cursor:pointer;transition:all .2s;font-variant-numeric:tabular-nums;color:var(--wh)}
.tip-chip:active{transform:scale(.95)}
.tip-chip.on{background:var(--accent-tint);color:var(--accent);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-border)}

/* ─── INLINE PAYMENT PICKER on offer confirm ─────────────────── */
.pay-inline{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-top:10px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:background .15s}
.pay-inline:active{background:rgba(255,255,255,.05)}
