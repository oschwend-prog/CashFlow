.pay-inline .pi-i{font-size:18px}
.pay-inline .pi-t{flex:1;font-size:13px;font-weight:700}
.pay-inline .pi-chg{font-size:11px;color:var(--accent);font-weight:700}
.pay-inline-opts{margin-top:6px;padding:4px;border-radius:12px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);animation:fadeUpSmall .25s cubic-bezier(.2,.8,.2,1) both}
.pii-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:background .15s}
.pii-opt:active{background:rgba(255,255,255,.04)}
.pii-opt.on{background:var(--accent-tint);color:var(--accent)}
.pii-opt span:first-child{font-size:16px}

/* ─── EARNINGS PROJECTION (replaces £100/£200 preview) ──────── */
.earn-preview .ep-label{font-size:10px;color:var(--mu);font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.earn-preview .ep-main{display:flex;align-items:baseline;gap:6px}
.earn-preview .ep-main-v{font-size:26px;font-weight:900;letter-spacing:-.02em;color:var(--cour);font-variant-numeric:tabular-nums}
.earn-preview .ep-main-l{font-size:12px;color:var(--gr);font-weight:600}
.earn-preview .ep-hint{font-size:11px;color:var(--mu);margin-top:4px;line-height:1.4}
.earn-preview .ep-row{display:flex;justify-content:space-between;font-size:12px;color:var(--gr);margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)}
.earn-preview .ep-row b{color:var(--cour);font-weight:800;font-variant-numeric:tabular-nums}

/* ═════════════════════════════════════════════════════════════════
   v7.3 — SLEEK REBUILD: amount hero, number pad, match screen
   ═════════════════════════════════════════════════════════════════ */

/* Tighter sheet — never blocks the map */
.home-v2 .sheet{max-height:50vh}
.home-v2 .sheet.expanded{height:50vh}

/* ─── AMOUNT HERO (home sheet) — the big tappable amount ───── */
.amt-hero{padding:6px 0 14px;text-align:center;cursor:pointer;user-select:none}
.amt-hero-lbl{font-size:10px;color:var(--mu);font-weight:800;text-transform:uppercase;letter-spacing:.12em;margin-bottom:2px}
.amt-hero-val{font-size:54px;font-weight:900;letter-spacing:-.04em;line-height:1;color:var(--wh);font-variant-numeric:tabular-nums}
.amt-hero-val .ahv-cur{font-size:28px;color:var(--mu);font-weight:700;vertical-align:16px;margin-right:2px}
.amt-hero-val .ahv-tap{font-size:11px;color:var(--mu);font-weight:600;display:block;margin-top:4px;letter-spacing:.06em;text-transform:uppercase}
.amt-hero:active{transform:scale(.98)}

/* v7.3: Pulsing setup frame — emerald outline around courier setup block while offline, calm when live */
.setup-frame{position:relative;padding:14px;margin:0 0 12px;border-radius:20px;background:rgba(11,18,33,.4);border:1.5px solid rgba(0,232,184,.55);box-shadow:0 0 0 0 rgba(0,232,184,.4),0 10px 30px rgba(0,0,0,.4);transition:border-color .4s,box-shadow .4s}
.setup-frame.pulse{animation:setupPulse 2.2s ease-in-out infinite}
@keyframes setupPulse{
  0%,100%{border-color:rgba(0,232,184,.55);box-shadow:0 0 0 0 rgba(0,232,184,.35),0 10px 30px rgba(0,0,0,.4)}
  50%{border-color:rgba(0,232,184,.85);box-shadow:0 0 0 6px rgba(0,232,184,.12),0 10px 30px rgba(0,0,0,.4)}
}
.setup-frame.live{border-color:rgba(0,232,184,.25);box-shadow:0 0 0 0 rgba(0,232,184,0),0 8px 24px rgba(0,0,0,.35);animation:none}
.setup-frame > *:last-child{margin-bottom:0}

/* v7.3: Courier-side float/fee hero — same tap-to-edit pattern as Get Cash amt-hero */
.float-hero{padding:14px 18px;margin:0 0 10px;border-radius:16px;background:linear-gradient(180deg,rgba(0,232,184,.08),rgba(0,232,184,.02));border:1px solid var(--cour-border);cursor:pointer;user-select:none;transition:transform .15s,background .2s;text-align:center}
.float-hero:active{transform:scale(.985);background:linear-gradient(180deg,rgba(0,232,184,.12),rgba(0,232,184,.04))}
.float-hero .fh-lbl{font-size:10px;color:var(--mu);font-weight:800;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.float-hero .fh-val{font-size:40px;font-weight:900;letter-spacing:-.03em;line-height:1;color:var(--cour);font-variant-numeric:tabular-nums}
.float-hero .fh-cur{font-size:22px;color:var(--cour);opacity:.6;font-weight:700;vertical-align:12px;margin-right:2px}
.float-hero .fh-pct{margin-left:2px;margin-right:0;vertical-align:16px}
.float-hero .fh-sub{font-size:11px;color:var(--gr);margin-top:6px;font-weight:600}
.float-hero.fee .fh-val{color:#FFB800}
.float-hero.fee{background:linear-gradient(180deg,rgba(255,184,0,.08),rgba(255,184,0,.02));border-color:rgba(255,184,0,.25)}
.float-hero.fee .fh-cur{color:#FFB800}
.float-hero.fee:active{background:linear-gradient(180deg,rgba(255,184,0,.12),rgba(255,184,0,.04))}

/* v7.3: Title above the numpad modal display */
.np-title{font-size:12px;font-weight:800;letter-spacing:.1em;color:var(--mu);text-transform:uppercase;text-align:center;margin-bottom:6px;margin-top:4px}

/* Fulfillment chips — minimal, inline */
.ff-chips{display:flex;gap:8px;margin:6px 0 12px}
.ff-chip{flex:1;padding:11px 10px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);cursor:pointer;text-align:center;transition:all .2s}
.ff-chip:active{transform:scale(.97)}
.ff-chip.on{background:var(--accent-tint);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-border)}
.ff-chip-i{font-size:18px;line-height:1}
.ff-chip-t{font-size:12px;font-weight:700;margin-top:3px;color:var(--wh)}
.ff-chip.on .ff-chip-t{color:var(--accent)}
.ff-chip-m{font-size:10px;color:var(--mu);margin-top:1px}

/* Primary CTA — full-width, breathe on idle */
.hero-cta{width:100%;padding:18px;border:none;border-radius:16px;font-size:17px;font-weight:800;cursor:pointer;letter-spacing:-.01em;display:flex;align-items:center;justify-content:center;gap:8px}

/* ─── NUMBER PAD (amount picker modal) ─────────────────────── */
.np-backdrop{position:fixed;inset:0;z-index:90;background:rgba(5,10,18,.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-end;animation:fadeIn .25s}
.np-sheet{width:100%;background:linear-gradient(180deg,rgba(11,18,33,.97),rgba(5,10,18,.99));backdrop-filter:blur(32px) saturate(160%);-webkit-backdrop-filter:blur(32px) saturate(160%);border-top:1px solid rgba(255,255,255,.12);border-radius:28px 28px 0 0;padding:12px 20px calc(20px + var(--sb));box-shadow:0 -12px 40px rgba(0,0,0,.6);animation:slideUp .3s cubic-bezier(.2,.8,.2,1)}
.np-handle{width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 14px}
.np-disp{text-align:center;padding:8px 0 16px;font-size:56px;font-weight:900;letter-spacing:-.04em;color:var(--wh);font-variant-numeric:tabular-nums;line-height:1}
.np-disp .npd-cur{font-size:30px;color:var(--mu);font-weight:700;vertical-align:18px;margin-right:2px}
.np-disp.over{color:var(--rd);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.np-hint{text-align:center;font-size:11px;color:var(--mu);margin-bottom:14px;font-weight:600;letter-spacing:.05em}
.np-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.np-key{padding:16px 0;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);font-size:22px;font-weight:700;cursor:pointer;text-align:center;user-select:none;transition:background .1s}
.np-key:active{background:rgba(255,255,255,.1);transform:scale(.96)}
.np-key.action{font-size:15px;color:var(--accent);font-weight:800}
.np-done{margin-top:12px;width:100%;padding:16px;border:none;border-radius:14px;background:var(--accent-grad);color:var(--accent-ink);font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 8px 22px var(--accent-glow)}
/* v7.3: Preset bill grid — replaces numpad input */
.bill-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-height:360px;overflow-y:auto;padding:4px 2px 4px 0}
.bill-chip{padding:14px 0;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:15px;font-weight:800;cursor:pointer;text-align:center;user-select:none;transition:all .15s;color:var(--wh);letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.bill-chip:active{transform:scale(.94)}
.bill-chip.on{background:var(--accent-tint-2);border-color:var(--accent);color:var(--accent);box-shadow:0 4px 14px var(--accent-glow),0 0 0 1px var(--accent) inset}

/* v7.3: Sub-role toggle — always visible at top of courier sheet */
.subrole-toggle{display:flex;gap:6px;padding:4px;margin-bottom:12px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.srt-opt{flex:1;padding:10px 12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s cubic-bezier(.2,.8,.2,1);user-select:none}
.srt-opt:active{transform:scale(.97)}
.srt-opt.on{background:var(--cour-tint);box-shadow:0 2px 10px var(--cour-glow),0 0 0 1px var(--cour-border) inset}
.srt-opt.on .srt-t{color:var(--cour)}
.srt-i{font-size:16px;filter:grayscale(.3);transition:filter .2s}
.srt-opt.on .srt-i{filter:grayscale(0)}
.srt-t{font-size:13px;font-weight:800;color:var(--gr);letter-spacing:-.01em;transition:color .2s}
.np-done:active{transform:scale(.98)}

/* ─── MATCH SCREEN (sleek) — replaces Matching + Offers ────── */
.v6-match{position:relative;height:100%}
.v6-match-top{position:absolute;top:calc(var(--st) + 14px);left:16px;right:16px;z-index:10;display:flex;align-items:center;gap:10px;pointer-events:none}
.v6-match-top > *{pointer-events:auto}
.v6-back{width:40px;height:40px;border-radius:50%;background:rgba(5,10,18,.78);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--wh);box-shadow:0 4px 14px rgba(0,0,0,.4)}
.v6-back:active{transform:scale(.92)}
.v6-match-title{flex:1;padding:10px 16px;background:rgba(5,10,18,.78);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.1);border-radius:24px;font-size:13px;font-weight:700;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.4)}

/* Match finding animation */
.v6-finding{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:6}
.v6-spin{width:88px;height:88px;margin:0 auto 18px;border:3px solid rgba(255,255,255,.06);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
.v6-finding-t{font-size:17px;font-weight:800;margin-bottom:4px}
.v6-finding-s{font-size:12px;color:var(--gr)}

/* Match sheet — bottom card when courier is found */
.v6-match-sheet{position:absolute;left:16px;right:16px;bottom:calc(var(--sb) + 16px);z-index:8;padding:18px;border-radius:22px;background:linear-gradient(180deg,rgba(11,18,33,.96) 0%,rgba(5,10,18,.98) 100%);backdrop-filter:blur(28px) saturate(140%);-webkit-backdrop-filter:blur(28px) saturate(140%);border:1px solid rgba(255,255,255,.1);box-shadow:0 -8px 32px rgba(0,0,0,.55),0 0 0 1px var(--accent-border);animation:slideUp .4s cubic-bezier(.2,.8,.2,1)}
.vms-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.vms-av{width:52px;height:52px;border-radius:50%;background:var(--cour-tint);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:var(--cour);border:1.5px solid var(--cour-border);flex-shrink:0}
.vms-info{flex:1;min-width:0}
.vms-name{font-size:16px;font-weight:800;letter-spacing:-.01em}
.vms-meta{font-size:11px;color:var(--gr);margin-top:2px}
.vms-price{text-align:right}
.vms-total{font-size:22px;font-weight:900;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.vms-eta{font-size:11px;color:var(--gr);margin-top:2px}
.vms-badges{display:flex;gap:6px;margin-bottom:12px}
.vms-badge{padding:4px 9px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.02em}
.vms-badge.cash{background:var(--cour-tint);color:var(--cour);border:1px solid var(--cour-border)}
.vms-badge.star{background:rgba(255,255,255,.04);color:var(--wh);border:1px solid rgba(255,255,255,.08)}
.vms-cta{width:100%;padding:16px;border:none;border-radius:14px;background:var(--accent-grad);color:var(--accent-ink);font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 8px 22px var(--accent-glow);letter-spacing:-.01em}
.vms-cta:active{transform:scale(.98)}
.vms-alt{margin-top:10px;text-align:center;font-size:12px;font-weight:700;color:var(--accent);cursor:pointer}
.vms-alt:active{opacity:.6}
.vms-alt-hint{text-align:center;font-size:10px;color:var(--mu);margin-top:6px;line-height:1.4}

/* Alternatives drawer */
.v6-alts{position:absolute;left:16px;right:16px;bottom:calc(var(--sb) + 16px);z-index:9;padding:14px;border-radius:22px;background:linear-gradient(180deg,rgba(11,18,33,.98),rgba(5,10,18,.99));backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.12);box-shadow:0 -12px 40px rgba(0,0,0,.6);animation:slideUp .32s cubic-bezier(.2,.8,.2,1);max-height:65vh;overflow-y:auto}
.v6-alts-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:2px 4px}
.v6-alts-hdr h4{font-size:13px;font-weight:800;letter-spacing:-.01em}
.v6-alts-close{font-size:18px;color:var(--gr);cursor:pointer;padding:4px 8px}
.v6-alt-card{display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);cursor:pointer;margin-bottom:8px;transition:all .15s}
.v6-alt-card:active{transform:scale(.98)}
.v6-alt-card:last-child{margin-bottom:0}
.v6-alt-av{width:40px;height:40px;border-radius:50%;background:var(--cour-tint);color:var(--cour);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;border:1.5px solid var(--cour-border)}
.v6-alt-info{flex:1;min-width:0}
.v6-alt-name{font-size:14px;font-weight:800}
.v6-alt-meta{font-size:11px;color:var(--gr);margin-top:1px}
.v6-alt-price{text-align:right;font-size:14px;font-weight:800;font-variant-numeric:tabular-nums}
.v6-alt-eta{font-size:11px;color:var(--gr);font-weight:600}

/* ─── COURIER HOME V6 — minimal sheet, map-dominant ──────── */
.cour-hero{padding:6px 0 12px;text-align:center}
.cour-hero-s{font-size:11px;color:var(--mu);font-weight:800;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.cour-hero-v{font-size:36px;font-weight:900;letter-spacing:-.03em;line-height:1;color:var(--cour);font-variant-numeric:tabular-nums}
.cour-hero-l{font-size:11px;color:var(--gr);margin-top:4px}

/* Huge go-online button */
/* v7.3: Rugged horizontal scroll ruler — for cash float + fee on courier home.
   Drag the ticks left/right; the center needle indicates current value. */
.wheel-card{margin:0 0 14px;padding:14px 0 12px;border-radius:16px;background:linear-gradient(180deg,rgba(8,14,26,.6) 0%,rgba(5,10,18,.75) 100%);border:1px solid rgba(255,255,255,.06);box-shadow:0 6px 18px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,.04) inset}
.wheel-hdr{display:flex;justify-content:space-between;align-items:baseline;padding:0 18px 8px}
.wheel-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:var(--mu)}
.wheel-val{font-size:26px;font-weight:900;letter-spacing:-.02em;color:var(--cour);font-variant-numeric:tabular-nums;filter:drop-shadow(0 0 8px var(--cour-glow));transition:color .12s}
.wheel-val.snap{animation:wheelValSnap .26s cubic-bezier(.2,.8,.2,1)}
@keyframes wheelValSnap{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
.wheel-outer{position:relative;height:62px;overflow:hidden;margin:0 0 8px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.015) 0 1px,transparent 1px 3px),linear-gradient(180deg,rgba(0,0,0,.2) 0%,transparent 50%,rgba(0,0,0,.2) 100%)}
.wheel-needle{position:absolute;left:50%;top:0;bottom:0;width:2px;margin-left:-1px;background:linear-gradient(180deg,var(--cour) 0%,var(--cour) 70%,transparent 100%);box-shadow:0 0 10px var(--cour-glow),0 0 3px var(--cour);z-index:3;pointer-events:none}
.wheel-needle::before,.wheel-needle::after{content:'';position:absolute;left:50%;transform:translateX(-50%);width:0;height:0;border-style:solid}
.wheel-needle::before{top:-1px;border-width:7px 5px 0 5px;border-color:var(--cour) transparent transparent transparent;filter:drop-shadow(0 0 5px var(--cour-glow))}
.wheel-needle::after{bottom:-1px;border-width:0 5px 7px 5px;border-color:transparent transparent var(--cour) transparent;filter:drop-shadow(0 0 5px var(--cour-glow))}
.wheel-outer::before,.wheel-outer::after{content:'';position:absolute;top:0;bottom:0;width:36px;z-index:2;pointer-events:none}
.wheel-outer::before{left:0;background:linear-gradient(90deg,rgba(5,10,18,.9) 0%,transparent 100%)}
.wheel-outer::after{right:0;background:linear-gradient(270deg,rgba(5,10,18,.9) 0%,transparent 100%)}
.wheel-track{position:absolute;inset:0;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-ms-overflow-style:none;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;touch-action:pan-x;overscroll-behavior-x:contain}
.wheel-track::-webkit-scrollbar{display:none}
.wheel-inner{display:flex;align-items:flex-end;padding:12px 50% 4px;min-width:min-content;height:100%}
.wheel-tick{flex:0 0 10px;height:14px;position:relative;scroll-snap-align:center;display:flex;flex-direction:column;align-items:center;justify-content:flex-end}
.wheel-tick::before{content:'';width:2px;height:9px;background:rgba(255,255,255,.22);border-radius:1px;transition:background .15s,height .15s}
.wheel-tick.major::before{height:16px;background:rgba(255,255,255,.42);width:2px}
.wheel-tick-lbl{position:absolute;bottom:-12px;font-size:9px;font-weight:700;color:var(--mu);letter-spacing:.02em;white-space:nowrap;transform:translateX(0)}
.wheel-sub{font-size:11px;color:var(--gr);font-weight:600;text-align:center;padding:0 18px;letter-spacing:-.005em}

/* v7.3: Get Cash requester variant — white/silver (matching "Cash" in upright white from logo) */
.wheel-card.req{background:linear-gradient(180deg,rgba(255,255,255,.06) 0%,rgba(255,255,255,.02) 100%);border-color:rgba(255,255,255,.12)}
.wheel-card.req .wheel-val{color:#fff;filter:drop-shadow(0 0 8px rgba(255,255,255,.25))}
.wheel-card.req .wheel-needle{background:linear-gradient(180deg,#fff 0%,#fff 70%,transparent 100%);box-shadow:0 0 10px rgba(255,255,255,.35),0 0 3px #fff}
.wheel-card.req .wheel-needle::before{border-color:#fff transparent transparent transparent;filter:drop-shadow(0 0 5px rgba(255,255,255,.35))}
.wheel-card.req .wheel-needle::after{border-color:transparent transparent #fff transparent;filter:drop-shadow(0 0 5px rgba(255,255,255,.35))}
.wheel-card.req .wheel-tick.major::before{background:rgba(255,255,255,.55)}

/* v7.6: Primary confirm CTA inside wheel-card — replaces the addr-line.confirm pattern */
.wheel-cta{display:block;width:calc(100% - 32px);margin:14px 16px 4px;padding:15px 18px;border:none;border-radius:14px;background:var(--accent-grad,linear-gradient(135deg,#FFFFFF 0%,#E8ECF2 55%,#C8CDD5 100%));color:var(--accent-ink,#05110D);font-family:inherit;font-size:15px;font-weight:800;letter-spacing:-.01em;cursor:pointer;box-shadow:0 8px 22px var(--accent-glow,rgba(255,255,255,.28)),0 1px 0 rgba(255,255,255,.25) inset;transition:transform .12s cubic-bezier(.2,.8,.2,1),box-shadow .2s}
.wheel-cta:active{transform:scale(.98);box-shadow:0 4px 12px var(--accent-glow,rgba(255,255,255,.28)),0 1px 0 rgba(255,255,255,.18) inset}
.wheel-cta:disabled{opacity:.5;cursor:not-allowed}

/* v7.3: Logo-aligned theme split.
   Requester (Get Cash) = white/silver dominant. Courier (Supply Cash) = emerald/near-black dominant.
   Applied via data-mode on the home screen wrapper so swaps re-tint everything. */
.scr.home-v2[data-mode="requester"]{--theme-bg-tint:rgba(255,255,255,.02);--theme-accent:#fff;--theme-accent-soft:rgba(255,255,255,.55)}
.scr.home-v2[data-mode="courier"]{--theme-bg-tint:rgba(0,232,184,.03);--theme-accent:var(--cour);--theme-accent-soft:rgba(0,232,184,.55)}
/* Courier-mode body shifts toward pure black for "flow"-side contrast */
body.mode-courier{background:#000}
body.mode-courier .scr.home-v2 .hc-top-wm{filter:brightness(1.1)}
body.mode-requester .scr.home-v2 .hc-top-wm{filter:brightness(1)}

.big-online{width:100%;padding:22px;border:none;border-radius:18px;font-size:18px;font-weight:900;cursor:pointer;letter-spacing:-.01em;display:flex;align-items:center;justify-content:center;gap:10px;margin:4px 0 10px;position:relative;overflow:hidden}
.big-online.off{background:var(--cour-grad);color:var(--cour-ink);box-shadow:0 10px 28px var(--cour-glow)}
.big-online.on{background:linear-gradient(135deg,rgba(255,77,106,.14),rgba(255,77,106,.06));color:var(--rd);border:1px solid rgba(255,77,106,.35);box-shadow:0 8px 22px rgba(255,77,106,.15)}
.big-online:active{transform:scale(.98)}
.big-online .bo-dot{width:10px;height:10px;border-radius:50%;background:currentColor;animation:pulse 1.4s infinite}

/* Cash/fee quick-edit chips inline on the sheet */
.cour-inline{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ci-item{padding:12px 14px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:all .15s}
.ci-item:active{transform:scale(.97)}
.ci-lbl{font-size:10px;color:var(--mu);font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.ci-val{font-size:17px;font-weight:800;margin-top:2px;color:var(--wh);font-variant-numeric:tabular-nums}
.ci-val b{color:var(--cour)}
.ci-sub{font-size:10px;color:var(--mu);margin-top:1px}

/* Address/CashPoint bar on home sheet */
.addr-line{display:flex;align-items:center;gap:10px;padding:12px 14px;margin-bottom:10px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:background .15s}
.addr-line:active{background:rgba(255,255,255,.05);transform:scale(.99)}
.addr-line .al-i{font-size:16px}
.addr-line .al-t{flex:1;font-size:13px;font-weight:700;color:var(--wh);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.addr-line .al-chg{font-size:11px;color:var(--accent);font-weight:800;text-transform:uppercase;letter-spacing:.05em}

/* ═════════════════════════════════════════════════════════════════
   v7.3 — CLEAN CHROME: mode switch lives in Profile only,
   home/match/request/courier all get the same simple top bar
   ═════════════════════════════════════════════════════════════════ */

/* Simple top chrome on map screens — avatar (left) + branded wordmark (right) */
.home-chrome{position:absolute;top:calc(var(--st) + 14px);left:16px;right:16px;z-index:14;display:flex;align-items:center;justify-content:space-between;pointer-events:none}
.home-chrome > *{pointer-events:auto}
.hc-avatar{width:40px;height:40px;border-radius:50%;background:rgba(5,10,18,.82);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.45);color:var(--wh);transition:transform .12s}
.hc-avatar:active{transform:scale(.92)}
/* v7.3: unread notification indicator on avatar */
.hc-av-dot{position:absolute;top:-2px;right:-2px;width:11px;height:11px;border-radius:50%;background:var(--cour);border:2px solid rgba(5,10,18,.95);box-shadow:0 2px 6px var(--cour-glow);animation:pulseLive 2s ease-in-out infinite}
.hc-avatar{position:relative}
/* Mode-scoped avatar tint (accent color + tint ring) */
[data-mode="requester"] .hc-avatar{color:#FFFFFF;border-color:rgba(255,255,255,.18)}
[data-mode="courier"] .hc-avatar{color:var(--cour);border-color:var(--cour-border)}
/* Branded wordmark (right side) — static, not a switch */
.hc-brand{padding:8px 16px;border-radius:20px;background:rgba(5,10,18,.82);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border:1px solid rgba(255,255,255,.1);box-shadow:0 4px 14px rgba(0,0,0,.45);font-family:'Instrument Serif',Georgia,serif;font-size:22px;line-height:1;letter-spacing:-.035em;user-select:none}
.hc-brand .c{color:#FFFFFF;font-weight:400;font-style:normal}
.hc-brand .f{color:var(--cour);font-style:italic;margin-left:-.03em;font-weight:400}
/* When in courier mode, the Cash side dims slightly to reflect active context */
[data-mode="courier"] .hc-brand .c{opacity:.55}
[data-mode="requester"] .hc-brand .f{opacity:.62}

/* ─── PROFILE MODE CARD — prominent toggle at top of Profile ──── */
.mode-card{margin:14px 20px 0;padding:18px;border-radius:22px;background:linear-gradient(180deg,rgba(11,18,33,.72) 0%,rgba(5,10,18,.58) 100%);border:1px solid var(--accent-border);box-shadow:0 6px 22px var(--accent-glow),0 0 0 1px rgba(255,255,255,.04) inset;backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%)}
.mc-hdr{text-align:center;padding:2px 0 14px;border-bottom:1px dashed rgba(255,255,255,.08);margin-bottom:14px}
.mc-hl{font-size:10px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px}
.mc-hv{font-family:'Instrument Serif',Georgia,serif;font-size:34px;line-height:1;letter-spacing:-.035em;margin-bottom:6px}
[data-mode="requester"] .mc-hv .c{color:#FFFFFF;font-style:normal;filter:drop-shadow(0 0 10px rgba(255,255,255,.35))}
[data-mode="courier"] .mc-hv .c{color:var(--cour);font-style:italic;filter:drop-shadow(0 0 12px var(--cour-glow))}
.mc-hs{font-size:12px;color:var(--gr);font-weight:600}
.mc-btn{width:100%;padding:14px 18px;border:none;border-radius:14px;cursor:pointer;font-size:14px;font-weight:800;letter-spacing:-.01em;background:var(--accent-grad);color:var(--accent-ink);box-shadow:0 8px 22px var(--accent-glow);display:flex;align-items:center;justify-content:center;gap:6px;transition:transform .12s}
.mc-btn:active{transform:scale(.98)}
.mc-btn .wm{font-family:'Instrument Serif',Georgia,serif;font-size:18px;letter-spacing:-.035em;line-height:1}
.mc-btn .wm .c{font-weight:400;font-style:normal}
.mc-btn .wm .f{font-weight:400;font-style:italic;margin-left:-.03em}

/* ─── WALLET SCREEN ─────────────────────────────────────────── */
.wallet-hero{margin:16px 20px;padding:20px;border-radius:20px;background:linear-gradient(180deg,var(--accent-tint-2) 0%,rgba(11,18,33,.72) 100%);border:1px solid var(--accent-border);box-shadow:0 10px 28px var(--accent-glow)}
.wh-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--mu);margin-bottom:4px}
.wh-val{font-size:38px;font-weight:900;letter-spacing:-.03em;line-height:1;color:var(--accent);font-variant-numeric:tabular-nums}
.wh-sub{font-size:11px;color:var(--gr);margin-top:6px;font-weight:600}
.wallet-actions{display:flex;gap:10px;margin:0 20px 14px}
.wallet-list{margin:0 20px;display:flex;flex-direction:column;gap:8px}
.wli{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);transition:all .15s}
.wli.pm{cursor:pointer}
.wli.pm:active{transform:scale(.99);background:rgba(255,255,255,.05)}
.wli.pm.on{background:var(--accent-tint);border-color:var(--accent-border);box-shadow:0 0 0 1px var(--accent-border)}
.wli-icn{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:1px solid rgba(255,255,255,.06)}
.wli.pm.on .wli-icn{background:var(--accent-tint-2);border-color:var(--accent-border)}
.wli-l{flex:1;min-width:0}
.wli-t{font-size:13px;font-weight:800;letter-spacing:-.01em}
.wli-s{font-size:11px;color:var(--gr);margin-top:2px}
.wli-v{font-size:14px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
.wli-rad{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);flex-shrink:0;position:relative;transition:all .2s}
.wli-rad.on{border-color:var(--accent);background:var(--accent)}
.wli-rad.on::after{content:'';position:absolute;top:3px;left:3px;width:8px;height:8px;border-radius:50%;background:var(--accent-ink)}

/* ═════════════════════════════════════════════════════════════════
   v7.3 — MATCHING SOPHISTICATION + POLISH
   ═════════════════════════════════════════════════════════════════ */

/* Reliability meter inside best-match sheet */
.vms-trust{margin-bottom:12px;padding:10px 12px;border-radius:12px;background:rgba(0,232,184,.04);border:1px solid rgba(0,232,184,.12)}
.vmt-label{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--gr);margin-bottom:6px;font-weight:700}
.vmt-label b{color:var(--cour);font-size:12px;font-weight:800}
.vmt-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:6px}
.vmt-fill{height:100%;background:linear-gradient(90deg,var(--cour-glow),var(--cour));border-radius:2px;box-shadow:0 0 8px var(--cour-glow);transition:width .6s cubic-bezier(.2,.8,.2,1)}
.vmt-stats{display:flex;gap:10px;font-size:10px;color:var(--mu);font-weight:600;flex-wrap:wrap}

/* Verified checkmark on avatar */
.vms-av{position:relative}
.vms-verify{position:absolute;right:-4px;bottom:-4px;width:18px;height:18px;background:var(--cour);color:var(--cour-ink);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;border:2px solid rgba(5,10,18,.95);box-shadow:0 2px 6px var(--cour-glow)}
.vms-vbadge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:800;background:var(--cour-tint);color:var(--cour);border:1px solid var(--cour-border);vertical-align:1px;letter-spacing:.02em}
.vms-badge.vet{background:rgba(255,184,0,.12);color:var(--am);border:1px solid rgba(255,184,0,.3)}

/* Alternative card — verified + reliability bar */
.v6-alt-av{position:relative}
.v6-alt-v{position:absolute;right:-3px;bottom:-3px;width:14px;height:14px;background:var(--cour);color:var(--cour-ink);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;border:1.5px solid rgba(5,10,18,.95)}
.v6-alt-rel{display:flex;align-items:center;gap:6px;margin-top:4px}
.v6-alt-rel-bar{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.v6-alt-rel-fill{height:100%;background:linear-gradient(90deg,var(--cour-glow),var(--cour));border-radius:2px}
.v6-alt-rel span{font-size:9px;color:var(--mu);font-weight:700;font-variant-numeric:tabular-nums}

/* ─── SKELETON LOADERS ─────────────────────────────────────── */
@keyframes skelShimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
.skel{background:linear-gradient(90deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 100%);background-size:400px 100%;animation:skelShimmer 1.2s infinite linear;border-radius:8px;color:transparent !important}
.skel-line{height:12px;margin:6px 0}
.skel-line.lg{height:20px}
.skel-line.w60{width:60%}
.skel-line.w40{width:40%}
.skel-line.w80{width:80%}
.skel-block{height:80px;margin:10px 0}
.skel-card{margin:0 20px 10px;padding:14px;border-radius:14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}

/* ─── EMPTY STATES ─────────────────────────────────────────── */
.empty-v2{padding:50px 30px;text-align:center;margin:20px}
.empty-v2 .ev-i{font-size:52px;margin-bottom:12px;opacity:.6}
.empty-v2 .ev-t{font-size:17px;font-weight:800;letter-spacing:-.01em;margin-bottom:6px}
.empty-v2 .ev-s{font-size:13px;color:var(--gr);line-height:1.5;max-width:280px;margin:0 auto}
.empty-v2 .ev-cta{margin-top:18px;padding:12px 22px;border:none;border-radius:12px;background:var(--accent-grad);color:var(--accent-ink);font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 6px 18px var(--accent-glow)}
.empty-v2 .ev-cta:active{transform:scale(.97)}

/* ─── PULL-TO-REFRESH INDICATOR ─────────────────────────────── */
.ptr{position:absolute;top:-46px;left:50%;transform:translateX(-50%);width:34px;height:34px;border-radius:50%;background:rgba(5,10,18,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:16px;transition:top .3s cubic-bezier(.2,.8,.2,1);box-shadow:0 4px 14px rgba(0,0,0,.4);z-index:5}
.ptr.pulling{top:14px}
.ptr.refreshing{top:14px}
.ptr.refreshing .ptr-i{animation:spin 1s linear infinite}

/* ─── FIRST-TIME WELCOME CARD ────────────────────────────── */
.ft-card{position:absolute;top:50%;left:20px;right:20px;transform:translateY(-60%);z-index:9;padding:28px 22px;border-radius:24px;background:linear-gradient(180deg,rgba(11,18,33,.96) 0%,rgba(5,10,18,.98) 100%);backdrop-filter:blur(32px) saturate(160%);-webkit-backdrop-filter:blur(32px) saturate(160%);border:1px solid rgba(255,255,255,.12);box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 0 1px var(--accent-border);text-align:center;animation:fadeUpSmall .5s cubic-bezier(.2,.8,.2,1) both}
.ft-wm{font-family:'Instrument Serif',Georgia,serif;font-size:40px;line-height:1;letter-spacing:-.035em;margin-bottom:14px}
.ft-wm .c{color:#fff}
.ft-wm .f{color:var(--cour);font-style:italic;margin-left:-.03em}
.ft-t{font-size:17px;font-weight:800;letter-spacing:-.01em;margin-bottom:6px}
.ft-s{font-size:13px;color:var(--gr);line-height:1.5;margin-bottom:18px}
.ft-cta{width:100%;padding:14px;border:none;border-radius:14px;background:var(--accent-grad);color:var(--accent-ink);font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 8px 22px var(--accent-glow)}
.ft-cta:active{transform:scale(.98)}
.ft-dismiss{margin-top:10px;font-size:11px;color:var(--mu);cursor:pointer}
.ft-dismiss:active{opacity:.5}

/* Live courier position marker — animates toward requester on match confirm */
.live-cour-pulse{position:absolute;width:42px;height:42px;margin-left:-21px;margin-top:-21px;pointer-events:none}
.live-cour-pulse::before,.live-cour-pulse::after{content:'';position:absolute;inset:0;border-radius:50%;background:var(--cour);opacity:.4;animation:pulse-ring 2s ease-out infinite}
.live-cour-pulse::after{animation-delay:1s}
@keyframes pulse-ring{0%{transform:scale(.3);opacity:.8}100%{transform:scale(1.8);opacity:0}}
.live-cour-dot{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:var(--cour);border:2px solid #fff;box-shadow:0 0 12px var(--cour-glow),0 2px 6px rgba(0,0,0,.4)}

/* Screen-enter micro-animation — subtle opacity + 4px rise, 320ms */
.scr-enter{animation:scrEnter .32s cubic-bezier(.2,.8,.2,1) both}
@keyframes scrEnter{from{opacity:.7;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ═════════════════════════════════════════════════════════════════
   v7.3 — SAFETY & TRUST FEATURES
   ═════════════════════════════════════════════════════════════════ */

/* Safety FAB cluster — top-right of tracking/delivery maps */
.safety-fab-group{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:8px;z-index:12}
.safety-fab{border:none;padding:0;width:44px;height:44px;border-radius:50%;background:rgba(5,10,18,.88);backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%);border:1px solid rgba(255,255,255,.12);box-shadow:0 6px 16px rgba(0,0,0,.5);cursor:pointer;color:var(--wh);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;font-size:18px;transition:all .15s}
.safety-fab:active{transform:scale(.92)}
.safety-fab .sf-lbl{font-size:8px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;margin-top:-2px;opacity:.85}
.safety-fab.share{background:rgba(0,232,184,.14);border-color:var(--cour-border);color:var(--cour)}
.safety-fab.issue{background:rgba(255,184,0,.14);border-color:rgba(255,184,0,.3);color:var(--am)}

/* Notification bell */
.notif-bell{position:relative;cursor:pointer}
.notif-count{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--rd);color:#fff;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center}

/* Notification feed rows */
.notif-row{display:flex;gap:10px;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:background .15s}
.notif-row:active{background:rgba(255,255,255,.03)}
.notif-row.unread{background:rgba(0,232,184,.03);border-left:2px solid var(--cour)}
.notif-i{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.notif-l{flex:1;min-width:0}
.notif-t{font-size:13px;font-weight:700;letter-spacing:-.01em}
.notif-s{font-size:11px;color:var(--gr);margin-top:2px;line-height:1.4}
.notif-ts{font-size:10px;color:var(--mu);margin-top:4px;font-weight:600}

/* Courier-side inbound request card */
.req-card{position:absolute;top:72px;left:12px;right:12px;z-index:20;padding:18px;border-radius:20px;background:linear-gradient(180deg,rgba(11,18,33,.98) 0%,rgba(5,10,18,1) 100%);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border:1px solid var(--cour-border);box-shadow:0 14px 40px var(--cour-glow);animation:reqCardIn .32s cubic-bezier(.2,.8,.2,1);pointer-events:auto}
@keyframes reqCardIn{from{transform:translateY(-24px);opacity:0}to{transform:translateY(0);opacity:1}}
.rc-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rc-hdr-pulse{width:10px;height:10px;border-radius:50%;background:var(--cour);box-shadow:0 0 0 0 var(--cour-glow);animation:pulsePing 1.4s ease-out infinite}
@keyframes pulsePing{0%{box-shadow:0 0 0 0 rgba(0,232,184,.4)}100%{box-shadow:0 0 0 10px rgba(0,232,184,0)}}
.rc-hdr-lbl{font-size:10px;font-weight:900;letter-spacing:.12em;color:var(--cour);text-transform:uppercase}
.rc-hdr-cd{margin-left:auto;font-size:11px;color:var(--am);font-weight:800;font-variant-numeric:tabular-nums}
.rc-body{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.rc-amt{font-size:28px;font-weight:900;color:var(--cour);letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.rc-info{flex:1;min-width:0}
.rc-addr{font-size:12px;color:var(--wh);font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rc-meta{font-size:10px;color:var(--mu);margin-top:2px;font-weight:600}
.rc-earn{text-align:right}
.rc-earn-v{font-size:14px;font-weight:800;color:var(--am)}
.rc-earn-l{font-size:9px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.rc-actions{display:flex;gap:8px}
.rc-btn{flex:1;padding:12px;border:none;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;transition:transform .12s}
.rc-btn:active{transform:scale(.97)}
.rc-btn.decline{background:rgba(255,255,255,.04);color:var(--gr);border:1px solid rgba(255,255,255,.08)}
.rc-btn.accept{background:linear-gradient(180deg,var(--cour),#00C9A0);color:var(--cour-ink);box-shadow:0 6px 16px var(--cour-glow)}

/* Rate-both (courier rating requester) */
.rate-both{padding:20px;margin:0 20px 14px;border-radius:18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.rate-both-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--mu);margin-bottom:10px}
.rate-both-stars{display:flex;gap:10px;justify-content:center;font-size:28px;margin:8px 0 12px}
.rate-both-star{cursor:pointer;opacity:.3;transition:all .15s}
.rate-both-star.on{opacity:1;filter:drop-shadow(0 0 6px rgba(255,184,0,.6))}

/* ═════════════════════════════════════════════════════════════════
   v7.3 — RUGGED SCROLL WHEELS (cash float + fee)
   Tactile horizontal ticker with center needle, detents, haptic

// ─── FEE MODEL (locked per brand/investor memory) ──────────────────────
//  Delivery fee  = platform fixed £5 per delivery (single tier, no upsell)
//  Transaction   = 2.9% + £0.20 (Airwallex/Stripe payment processing)
//  Courier fee   = variable 0–20%, courier-set. 75/25 split (courier/platform)
//  Platform net per delivery = delivery_fee + 25% * courier_fee_amount − txn_cost
const TXN_PCT=0.029, TXN_FIX=0.20;     // payment processing
const PCUT=.25;                         // platform share of courier fee
const COUR_DEFAULT=10;                  // pre-selection courier fee estimate (%)
const DELIVERY_FEE=5;                   // flat platform delivery fee

// Compute the full fee breakdown for a given amount + courier %
function calcFees(amt, _unused, courPct){
  const delivery = DELIVERY_FEE;
  const courierFee = amt * (courPct/100);
  const subtotal = amt + delivery + courierFee;
  const txn = subtotal*TXN_PCT + TXN_FIX;
  const total = subtotal + txn;
  return {
    amt, delivery, courierFee, courPct, txn, total,
    tier:{label:'Delivery',fee:DELIVERY_FEE},
    platformNet: delivery + courierFee*PCUT - txn
  };
}

// v6: pick the best courier for a given request — weighted score
// Lower is better: price × 0.4 + ETA × 2 − reliability × 0.35 − cashReadyBonus
// v7.3: reliability now dominates over pure star rating
function autoMatch(amt){
  const candidates = MOCK_COURIERS.filter(c=>c.cash>=amt||c.cash===0).map(c=>{
    const hasCash = c.cash>=amt;
    const adjEta  = hasCash?c.eta:c.eta+8;
    const fees    = calcFees(amt,null,c.fee);
    const rel     = reliabilityScore(c);
    const score   = fees.total*0.4 + adjEta*2 - rel*0.35 - (hasCash?3:0);
    return {...c, hasCash, adjEta, fees, rel, score};
  });
  candidates.sort((a,b)=>a.score-b.score);
  return {best: candidates[0], alternatives: candidates.slice(1, 4)};
}

// v7.3: Bind rugged scroll-wheel rulers. Each .wheel-outer becomes a horizontal
// scrollable strip where the center needle picks the tick under it.
function bindWheels(){
  document.querySelectorAll('.wheel-outer').forEach(outer=>{
    if(outer.dataset.bound)return;
    outer.dataset.bound='1';
    const key = outer.dataset.wheel;
    const min = parseInt(outer.dataset.min);
    const max = parseInt(outer.dataset.max);
    const step = parseInt(outer.dataset.step);
    const track = outer.querySelector('.wheel-track');
    const inner = outer.querySelector('.wheel-inner');
    // Map keys to their state field + display element + on-change callback
    const CFG = {
      cash:{field:'cashOnHand', valId:'wheelValCash', fmt:v=>`£${v}`, min:20},
      fee: {field:'courierFee', valId:'wheelValFee',  fmt:v=>`${v}%`, min:0},
      amt: {field:'amt',        valId:'wheelValAmt',  fmt:v=>`£${v}`, min:25}
    };
    const cfg = CFG[key];
    if(!cfg)return;
    const valEl = document.getElementById(cfg.valId);
    // Position wheel to current value on first bind
    const setScrollToValue = (v)=>{
      const ticks = inner.querySelectorAll('.wheel-tick');
      const idx = Math.round((v - min) / step);
      const tick = ticks[Math.min(Math.max(idx,0), ticks.length-1)];
      if(tick){
        const trackRect = track.getBoundingClientRect();
        const tickRect = tick.getBoundingClientRect();
        const delta = (tickRect.left + tickRect.width/2) - (trackRect.left + trackRect.width/2);
        track.scrollLeft += delta;
      }
    };
    setScrollToValue(parseInt(outer.dataset.value));
    let lastV = parseInt(outer.dataset.value);
    let scrollTimer = null;
    track.addEventListener('scroll',()=>{
      const ticks = inner.querySelectorAll('.wheel-tick');
      const trackRect = track.getBoundingClientRect();
      const centerX = trackRect.left + trackRect.width/2;
      let bestIdx = 0, bestDist = Infinity;
      ticks.forEach((t,i)=>{
        const r = t.getBoundingClientRect();
        const d = Math.abs((r.left + r.width/2) - centerX);
        if(d < bestDist){bestDist = d; bestIdx = i;}
      });
      const v = min + bestIdx*step;
      if(v !== lastV){
        lastV = v;
        valEl && (valEl.textContent = cfg.fmt(v));
        if(valEl){ valEl.classList.remove('snap'); void valEl.offsetWidth; valEl.classList.add('snap'); }
        if(navigator.vibrate) navigator.vibrate(2);
      }
      // Debounce-commit after scroll stops
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(()=>{
        if(v < cfg.min) {
          toast(`Min ${cfg.fmt(cfg.min)}`, `Below minimum`, '⚠️');
        }
        S[cfg.field] = v;
        saveSettings();
        // v7.3: also live-update any other references on the screen that depend on this value
        const sub = outer.parentElement.querySelector('.wheel-sub');
        if(sub && key==='fee'){
          sub.innerHTML = `You keep 75% · +£${(100*v/100*(1-PCUT)).toFixed(2)} per £100 delivered`;
        }
        // For Get Cash: update the integrated CTA label live (respects pickup mode)
        const cta = document.getElementById('wheelCtaAmt');
        if(cta && key==='amt'){
          const isP = S.deliveryMode === 'pickup';
          if(isP && !S.selectedCashPoint){
            cta.textContent = 'Choose a CashPoint ›';
          } else if(isP){
            cta.textContent = `Reserve £${v} →`;
          } else {
            cta.textContent = `Request £${v} →`;
          }
        }
      }, 180);
    }, {passive:true});
  });
}

function bindPTR(){

function haptic(kind='light'){
  if(!navigator.vibrate)return;
  const patterns={tick:8,light:12,medium:20,success:[15,40,15],warn:[30,50,30],heavy:[10,30,10,30,10]};
  try{navigator.vibrate(patterns[kind]||patterns.light)}catch(e){}
}

// Sound effects via Web Audio API — toggleable, muted by default
let _audioCtx=null;
function playSound(kind='tick'){
  if(!S.soundOn)return;
  try{
    if(!_audioCtx)_audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const ctx=_audioCtx;
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    const freqs={tick:880,success:[660,990,1320],error:220,match:[440,660,880]};
    const dur={tick:.05,success:.3,error:.15,match:.45};
    if(Array.isArray(freqs[kind])){
      // Arpeggio
      freqs[kind].forEach((f,i)=>{
        const oo=ctx.createOscillator();const gg=ctx.createGain();
        oo.frequency.value=f;oo.type='sine';
        gg.gain.setValueAtTime(0,ctx.currentTime+i*.08);
        gg.gain.linearRampToValueAtTime(.15,ctx.currentTime+i*.08+.02);
        gg.gain.linearRampToValueAtTime(0,ctx.currentTime+i*.08+.14);
        oo.connect(gg);gg.connect(ctx.destination);
        oo.start(ctx.currentTime+i*.08);oo.stop(ctx.currentTime+i*.08+.14);
      });
      return;
    }
    o.frequency.value=freqs[kind]||880;o.type='sine';
    g.gain.setValueAtTime(.12,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+(dur[kind]||.05));
    o.connect(g);g.connect(ctx.destination);
    o.start();o.stop(ctx.currentTime+(dur[kind]||.05));
  }catch(e){}
}
// Bundled feedback: haptic + sound together for major actions
function feedback(hapticKind,soundKind){
  haptic(hapticKind);
  if(soundKind)playSound(soundKind);
}
// Animate a number from `from` to `to` over `dur` ms into an element
function animateNumber(el,from,to,dur=600,prefix='£',decimals=2){
  if(!el)return;
  const start=performance.now();
  const step=(t)=>{
    const p=Math.min(1,(t-start)/dur);
    const eased=1-Math.pow(1-p,3);                  // ease-out cubic
    const v=from+(to-from)*eased;
    el.textContent=prefix+v.toFixed(decimals);
    if(p<1)requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

// when the other mode has something worth attention (pending payout, cached state, etc.)
function updateModeHints(){
  const cashHintEl = document.getElementById('mbHintCash');
  const flowHintEl = document.getElementById('mbHintFlow');
  if(!cashHintEl || !flowHintEl) return;

  // Flow side signals (visible on the Flow button, shown when user is currently in Cash mode)
  let flowHint = '';
  if(S.mode==='requester'){
    if(S.online) flowHint = 'LIVE';                                   // you're still online as courier
    else if(S.earnData?.week > 0) flowHint = '£'+Math.round(S.earnData.week); // payout ready
    else if(_MODE_CACHE.courier?.supplyMode) flowHint = '•';          // prior setup, return hint
  }

  // Cash side signals (visible on Cash button when user is currently in Flow mode)
  let cashHint = '';
  if(S.mode==='courier'){
    if(S.order && S.order.status!=='CONFIRMED') cashHint = 'LIVE';    // active order pending
    else if(_MODE_CACHE.requester?.amt && _MODE_CACHE.requester?.addr) cashHint = '•'; // draft in progress
  }

  cashHintEl.textContent = cashHint;
  cashHintEl.className = 'mb-hint' + (cashHint ? ' on' : '') + (cashHint==='LIVE' ? ' live' : '');
  flowHintEl.textContent = flowHint;
  flowHintEl.className = 'mb-hint' + (flowHint ? ' on' : '') + (flowHint==='LIVE' ? ' live' : '');
}

function setMode(newMode,viaSwipe){
  if(S.mode===newMode)return;
  feedback('medium','tick');
  // v7.3: snapshot current mode state before swapping
  _snapshotMode(S.mode);
  S._modeAnim = newMode==='courier' ? 'slide-to-courier' : 'slide-to-requester';
  S.mode=newMode;
  // Restore the other side's remembered state if we've visited before
  _restoreMode(newMode);
  // Close any open sheets/drawers so the swap feels clean
  S._activitySheet=false;S._walletSheet=false;S._profileDrawer=false;
  // Stop courier simulator if leaving courier mode
  if(newMode==='requester' && polls.reqSim) stopRequestSim();
  document.documentElement.setAttribute('data-mode',newMode);
  document.body.classList.remove('mode-requester','mode-courier');
  document.body.classList.add('mode-'+newMode);
  render();
  // Clear the anim class after transition — v7.3: 240ms, not 650
  setTimeout(()=>{S._modeAnim=null},240);
}

// Compute a composite reliability score 0–100 from trust signals
function reliabilityScore(c){
  const r = (c.rating/5)*50;           // 0–50 points from rating
  const o = c.onTime*25;               // 0–25 points from on-time
  const n = (1-c.cancel)*15;           // 0–15 points from non-cancellation

  return Math.round(r+o+n+v);
}

// v6: from home → match screen directly (auto-match)
function startMatch(){
  if(!S.addr && S.deliveryMode!=='pickup'){
    // Default to user's Home address if no pin is set
    const home=S.savedAddresses[0];
    if(home){S.addr=home.addr;S.coords=[home.lng,home.lat];}
    else{toast('Add address','Set delivery address first','📍');return}
  }
  if(S.amt<25){toast('Min £25','','⚠️');return}
  haptic('medium');
  S._match=null;                       // will compute after "finding" delay
  S.selectedCourier=null;
  S._alts=false;
  go('match');
  // Simulate search — 2.2s delay
  setTimeout(()=>{
    S._match = autoMatch(S.amt);
    S.selectedCourier = S._match.best;
    S.courierHasCash = S._match.best.hasCash;
    render();
    feedback('success','match');
  }, 2200);
}

// Swap in an alternative courier from the drawer
function pickAlt(id){
  haptic('tick');
  const c = MOCK_COURIERS.find(x=>x.id===id);
  if(!c) return;
  // Rebuild match with this as best
  const others = S._match.alternatives.filter(a=>a.id!==id).concat([S._match.best]);
  S._match = { best: {...c, hasCash:c.cash>=S.amt, adjEta:c.cash>=S.amt?c.eta:c.eta+8, fees:calcFees(S.amt,null,c.fee)}, alternatives: others };
  S.selectedCourier = S._match.best;
  S.courierHasCash = S._match.best.hasCash;
  S._alts = false;
  render();
}

  feedback('medium','success');

  S.tipAmount=0;S.rating=0;

}

// Requester sees bids from available couriers, picks one, THEN confirms payment.
function renderCourierSelect(){
  const couriers=MOCK_COURIERS
    .filter(c=>c.cash>=S.amt||c.cash===0)
    .map(c=>({
      ...c,
      hasCash:c.cash>=S.amt,
      adjEta:c.cash>=S.amt?c.eta:c.eta+8,
      fees:calcFees(S.amt,null,c.fee)
    }));
  // Sorting
  const sort = S.offerSort || 'best';
  couriers.sort((a,b)=>{
    if(sort==='fastest') return a.adjEta - b.adjEta;
    if(sort==='cheapest') return a.fees.total - b.fees.total;
    if(sort==='rated')   return b.rating - a.rating;
    // "best" = weighted blend: low price + fast + high rating
    const scoreA = a.fees.total*.6 + a.adjEta*2 - a.rating*5;
    const scoreB = b.fees.total*.6 + b.adjEta*2 - b.rating*5;
    return scoreA - scoreB;
  });
  const selected = S.selectedCourier;
  const selFees = selected ? calcFees(S.amt,null,selected.fee) : null;

  return`<div class="scr on nt home-v2" data-offers="1">
    <!-- Full-bleed map stays — couriers plotted -->
    <div class="home-map-full"><div data-map="offers" data-lat="${S.coords?S.coords[1]:51.5215}" data-lng="${S.coords?S.coords[0]:-0.0730}"></div></div>

    <!-- Top: back + wordmark switch -->
    <!-- TOP CHROME — back + brand -->
    <div class="home-chrome">
      <div class="hc-avatar" onclick="haptic('tick');go('request')" title="Back">←</div>
      <div class="hc-brand wm"><span class="c">Cash</span><span class="f">Flow</span></div>
    </div>

    <!-- Offers sheet — takes most of screen -->
    <div class="sheet expanded" style="height:calc(100vh - var(--st) - 180px)">
      <div class="sheet-handle"></div>
      <div class="sheet-body">

        <!-- Context pill -->
        <div class="flow-pill">
          <span class="fp-dot"></span>
          <span class="fp-t">${couriers.length} offers for £${S.amt} delivery</span>
          <span class="fp-amt">${S.addr ? (S.addr.length>22?S.addr.substring(0,22)+'…':S.addr) : 'Your address'}</span>
        </div>

        <!-- Sort tabs -->
        <div class="offer-sort">
          ${[
            {id:'best',l:'Best match'},
            {id:'cheapest',l:'Cheapest'},
            {id:'fastest',l:'Fastest'},
            {id:'rated',l:'Top rated'}
          ].map(o=>`<div class="os-tab ${sort===o.id?'on':''}" onclick="haptic('tick');S.offerSort='${o.id}';render()">${o.l}</div>`).join('')}
        </div>

        <!-- Offer list -->
        <div class="offer-list">
          ${couriers.map((c,i)=>`
            <div class="offer-card ${selected?.id===c.id?'on':''}" onclick="haptic('tick');S.selectedCourier=MOCK_COURIERS.find(x=>x.id==='${c.id}');render()">
              ${i===0 && sort==='best' ? '<span class="oc-ribbon">Best match</span>' : ''}
              ${i===0 && sort==='cheapest' ? '<span class="oc-ribbon">Best price</span>' : ''}
              ${i===0 && sort==='fastest' ? '<span class="oc-ribbon">Fastest</span>' : ''}
              <div class="oc-top">
                <div class="oc-av">${c.name.charAt(0)}</div>
                <div class="oc-info">
                  <div class="oc-name">${c.name}</div>
                  <div class="oc-meta">⭐ ${c.rating} · ${c.dist}km away · ${c.area}</div>
                </div>
                <div class="oc-price">
                  <div class="oc-total">£${c.fees.total.toFixed(2)}</div>
                  <div class="oc-eta">${c.adjEta} min ETA</div>
                </div>
              </div>
              <div class="oc-bot">
                <div class="oc-badges">
                  <span class="oc-badge ${c.hasCash?'ready':'atm'}">${c.hasCash?'⚡ Cash ready':'🏧 Needs ATM'}</span>
                  <span class="oc-badge rate">${c.fee}% courier fee</span>
                </div>
                <div class="oc-breakdown">
                  £${c.fees.amt.toFixed(0)} cash · £${c.fees.delivery.toFixed(0)} delivery · £${c.fees.courierFee.toFixed(2)} courier · £${c.fees.txn.toFixed(2)} txn
                </div>
              </div>
            </div>`).join('')}
        </div>

        <!-- Summary of selected offer + final CTA -->
        ${selected ? `
        <div class="offer-confirm">
          <div class="oc-conf-head">
            <div class="oc-conf-title">You're about to pay</div>
            <div class="oc-conf-amt">£${selFees.total.toFixed(2)}</div>
          </div>
          <div class="oc-conf-rows">
            <div class="ocr"><span>To ${selected.name} · ${selected.adjEta} min</span><span>£${selFees.amt.toFixed(2)} cash</span></div>
            <div class="ocr"><span>Delivery + courier + txn fees</span><span>£${(selFees.delivery+selFees.courierFee+selFees.txn).toFixed(2)}</span></div>
          </div>
          <!-- Inline payment method picker -->
          <div class="pay-inline" onclick="haptic('tick');S._payPickerOpen=!S._payPickerOpen;render()">
            <span class="pi-i">${S.payMethod==='apple'?'🍎':S.payMethod==='saved'?'💳':'➕'}</span>
            <span class="pi-t">${S.payMethod==='apple'?'Apple Pay':S.payMethod==='saved'?'Visa •••• 4821':'Add new card'}</span>
            <span class="pi-chg">Change ▾</span>

          </div>`:''}
          <button class="btn btn-em" style="margin:12px 0 0;width:100%" onclick="haptic('medium');confirmAndPay()">
            Confirm & Pay £${selFees.total.toFixed(2)} →
          </button>
          <div class="oc-conf-note">You won't be charged until the courier accepts and hands over the cash.</div>
        </div>` : `
        <div class="offer-empty-sel">
          <div class="oes-i">👆</div>
          <div class="oes-t">Tap an offer to review & confirm</div>
          <div class="oes-s">You'll see the full breakdown before paying. No auto-selection.</div>
        </div>`}

      </div>
    </div>
  </div>`;
}

// Start a 30s countdown when matching screen appears — auto-cancels if no acceptance
function startMatchCountdown(){
  clearInterval(polls.matchCD);
  let secs=30;
  polls.matchCD=setInterval(()=>{
    secs--;
    const el=document.getElementById('matchSecs');if(el)el.textContent=secs;
    if(secs<=0){
      clearInterval(polls.matchCD);
      if(S.screen==='matching'){
        toast('No response','Courier didn\u2019t accept — try another','⏱');
        cancelReq();
      }
    }
  },1000);
}

// Unified completion after combined review
function completeReview(){
  if(!S.verifyChecks.every(Boolean)){toast('Check all three','Verify cash first','⚠️');return}
  if(S.order&&!S._demo)sb('/rest/v1/orders?id=eq.'+S.order.id,{method:'PATCH',body:JSON.stringify({status:'CONFIRMED'})}).catch(()=>{});
  const msgs=[];
  if(S.rating>0)msgs.push(S.rating+'★ rating');
  if(S.tipAmount>0)msgs.push('£'+S.tipAmount+' tip');
  toast('Complete!',msgs.length?msgs.join(' · '):'Cash received','✅');
  S.order=null;S.addr=null;S.coords=null;S.orderStep=0;S.chatMessages=[];
  S.tipAmount=0;S.rating=0;S.verifyChecks=[false,false,false];
  setTimeout(()=>go('home','home'),1200);
}

// v7.3: Courier finishes delivery — submits rating + returns to home
function completeCourDelivery(){
  feedback('success','success');
  const earned = (S.order?.amount||0) * (S.courierFee/100) * (1-PCUT);
  // Update courier stats
  if(S.earnData){S.earnData.today += earned; S.earnData.deliveries++}
  // Push a notification row
  if(!Array.isArray(S.notifications))S.notifications=[];
  S.notifications.unshift({
    id:'n-'+Date.now(),
    icon:'💰',
    title:'Payout released',
    body:`£${earned.toFixed(2)} · ${S.order?.delivery_address?.substring(0,30)||'delivery'}`,
    ts:'Just now',
    unread:true,
    kind:'payout'
  });
  toast('Delivery complete!','£'+earned.toFixed(2)+' earned','✅');
  S.order=null; S.orderStep=0; S.courRating=0;
  go('home','home');
  if(S.online)startRequestSim();
}

    <div class="card" style="margin:16px 20px 0">
      <div class="cs-lbl">7-Day Chart</div>
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="50" style="margin-top:8px">
        <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--em)" stop-opacity=".3"/><stop offset="100%" stop-color="var(--em)" stop-opacity="0"/></linearGradient></defs>

      <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--mu);padding:4px 0">${days.map(d=>`<span>${d}</span>`).join('')}</div>
    </div>
    <div class="card" style="margin:10px 20px 0">

// ---- GPS Detect ----
function detectGPS(){
  if(!navigator.geolocation){toast('No GPS','Location not available','📍');return}
  toast('Detecting...','Finding your location','📍');
  navigator.geolocation.getCurrentPosition(async pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    try{const r=await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${lng},${lat}.json?access_token=${MBT}&limit=1`);
      const d=await r.json();if(d.features?.[0]){const f=d.features[0];S.addr=f.place_name;S.coords=[lng,lat];render();toast('Found!',f.place_name.substring(0,30),'✅');}
    }catch(e){toast('Error','Could not detect address','❌')}
  },()=>toast('Denied','Allow location access in settings','📍'));
}

async function sendOTP(){
  const e=document.querySelector('#authEmail')?.value?.trim()||S.email;
  if(!e||!e.includes('@'))return;S.email=e;
  try{const r=await fetch(SB+'/auth/v1/otp',{method:'POST',headers:{'Content-Type':'application/json',apikey:SK},body:JSON.stringify({email:e})});
    const d=await r.json();if(d.error)throw new Error(d.error.message);S._otpSent=true;render();
    setTimeout(()=>{const row=$('otpRow');if(!row)return;row.innerHTML='';
      for(let i=0;i<8;i++){const inp=document.createElement('input');inp.type='text';inp.inputMode='numeric';inp.maxLength=1;inp.className='a-dig';
        inp.addEventListener('input',function(){if(this.value&&i<7)row.children[i+1].focus();if(i===7)verifyOTP()});
        inp.addEventListener('keydown',function(ev){if(ev.key==='Backspace'&&!this.value&&i>0)row.children[i-1].focus()});row.appendChild(inp)}
      row.children[0]?.focus();
    },100);
  }catch(er){toast('Error',er.message,'❌')}
}
async function verifyOTP(){
  const ds=document.querySelectorAll('.a-dig'),code=Array.from(ds).map(d=>d.value).join('');
  if(code.length<8)return;
  try{const r=await fetch(SB+'/auth/v1/verify',{method:'POST',headers:{'Content-Type':'application/json',apikey:SK},body:JSON.stringify({email:S.email,token:code,type:'email'})});
    const d=await r.json();if(d.error)throw new Error(d.error.message);
    S.user={id:d.user?.id,email:d.user?.email||S.email,access_token:d.access_token};
    try{const p=await rest('profiles','id=eq.'+S.user.id+'&select=*');
      if(!p.length)await sb('/rest/v1/profiles',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify({id:S.user.id,display_name:S.email.split('@')[0]})});
      else S.user.display_name=p[0].display_name;
    }catch(e){S.user.display_name=S.email.split('@')[0]}
    S._otpSent=false;go('home','home');toast('Welcome!',S.email,'✓');
  }catch(er){const e2=$('authErr2');if(e2)e2.textContent=er.message}
}

// Live request simulator — spawns incoming requests at random nearby coords while online
function startRequestSim(){
  if(polls.reqSim)return;
  // Seed first request fast so courier sees something immediately
  setTimeout(()=>{if(S.online)spawnLiveRequest()}, 1800);
  // Then spawn every 7–14s
  polls.reqSim = setInterval(()=>{
    if(!S.online){stopRequestSim();return}
    if(S.liveRequests.length>=5)return;        // cap active pins
    spawnLiveRequest();
  }, 7000 + Math.random()*7000);
}
function stopRequestSim(){
  clearInterval(polls.reqSim); polls.reqSim=null;
  clearInterval(polls.alertTimer); polls.alertTimer=null;
  S.liveRequests=[]; S.activeAlert=null;
  // Remove existing live-req markers from the map
  const m=maps.cour; if(m && m._liveReqMarkers){m._liveReqMarkers.forEach(mk=>mk.remove()); m._liveReqMarkers=[]}
}
function spawnLiveRequest(){
  const m=maps.cour; if(!m)return;
  const c=m.getCenter();
  const angle=Math.random()*Math.PI*2;
  const r=.002+Math.random()*.01;
  const lng=c.lng+Math.cos(angle)*r;
  const lat=c.lat+Math.sin(angle)*r;
  const amt=[20,50,80,100,150,200,300][Math.floor(Math.random()*7)];
  const id='lr-'+Date.now()+'-'+Math.floor(Math.random()*999);
  const dist=Math.round(Math.hypot(Math.cos(angle)*r, Math.sin(angle)*r) * 111000 / 10) / 100; // km
  const eta=Math.max(2, Math.round(dist*3 + 2));
  const earn=(amt*(S.courierFee/100)*(1-PCUT)).toFixed(2);
  const req={id,lng,lat,amt,dist,eta,earn,ts:Date.now()};
  S.liveRequests.push(req);
  // Place marker on the map
  const el=document.createElement('div');
  el.className='live-req';
  el.innerHTML='£'+amt;
  el.addEventListener('click',()=>showReqAlert(id));
  const mk=new mapboxgl.Marker({element:el}).setLngLat([lng,lat]).addTo(m);
  m._liveReqMarkers=m._liveReqMarkers||[];
  m._liveReqMarkers.push(mk);
  mk._reqId=id;
  haptic('tick');
  // Surface the alert if none currently showing
  if(!S.activeAlert) showReqAlert(id);
  // Auto-expire after 25s
  setTimeout(()=>{expireLiveRequest(id)}, 25000);
}
function expireLiveRequest(id){
  const idx=S.liveRequests.findIndex(r=>r.id===id); if(idx<0)return;
  S.liveRequests.splice(idx,1);
  const m=maps.cour; if(m && m._liveReqMarkers){
    const i=m._liveReqMarkers.findIndex(mk=>mk._reqId===id);
    if(i>=0){m._liveReqMarkers[i].remove(); m._liveReqMarkers.splice(i,1)}
  }
  if(S.activeAlert===id){
    S.activeAlert=null;
    clearInterval(polls.alertTimer);
    const alertEl=document.getElementById('reqAlert'); if(alertEl){alertEl.className='';alertEl.innerHTML=''}
    // Surface next pending request if any
    setTimeout(()=>{if(S.liveRequests[0]&&!S.activeAlert)showReqAlert(S.liveRequests[0].id)}, 400);
  }
}

// ---- Maps ----
// Seed demand points around a center — used for courier "demand near you" heatmap
function seedDemand(lng,lat,n=14){
  const pts=[];
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const r=Math.pow(Math.random(),.7)*.018; // denser near center
    const w=.4+Math.random()*.6;             // intensity weight
    pts.push({type:'Feature',geometry:{type:'Point',coordinates:[lng+Math.cos(a)*r,lat+Math.sin(a)*r]},properties:{weight:w}});
  }
  return{type:'FeatureCollection',features:pts};
}

// Compute a smooth curved "route" between two coords (quadratic bezier for organic feel)
function buildRoute(from,to,steps=64){
  const midX=(from[0]+to[0])/2,midY=(from[1]+to[1])/2;
  // Offset midpoint perpendicularly for a subtle curve
  const dx=to[0]-from[0],dy=to[1]-from[1];
  const off=.00045;
  const cx=midX-dy*off*8,cy=midY+dx*off*8;
  const coords=[];
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const x=(1-t)*(1-t)*from[0]+2*(1-t)*t*cx+t*t*to[0];
    const y=(1-t)*(1-t)*from[1]+2*(1-t)*t*cy+t*t*to[1];
    coords.push([x,y]);
  }
  return coords;
}

          new mapboxgl.Marker({element:pinEl,anchor:'bottom'}).setLngLat(S.coords).addTo(m);

    // ─── REQUESTER TRACKING: courier marker animating along curved route ─
    if(id==='track'){
      const dest=S.coords||[lng,lat];
      // Start courier ~700m NE of destination
      const origin=[dest[0]-.006,dest[1]+.004];
      const path=buildRoute(origin,dest,72);

      m.addSource('d-rem',{type:'geojson',data:remaining});

      m.addLayer({id:'d-casing',type:'line',source:'d-rem',
        paint:{'line-color':'rgba(255,184,0,0.22)','line-width':10,'line-blur':4},
        layout:{'line-cap':'round','line-join':'round'}});
      m.addLayer({id:'d-rem',type:'line',source:'d-rem',
        paint:{'line-color':'rgba(255,255,255,.6)','line-width':3,'line-dasharray':[1.5,1.5]},
        layout:{'line-cap':'round','line-join':'round'}});
      m.addLayer({id:'d-done',type:'line',source:'d-done',
        paint:{'line-color':'#FFB800','line-width':4},
        layout:{'line-cap':'round','line-join':'round'}});

      // Destination pin (emerald — where requester waits)
      const destEl=document.createElement('div');
      destEl.className='hot-marker em';
      new mapboxgl.Marker({element:destEl}).setLngLat(dest).addTo(m);

      // Courier marker (amber)
      const courEl=document.createElement('div');
      courEl.className='hot-marker';
      const courMk=new mapboxgl.Marker({element:courEl}).setLngLat(origin).addTo(m);

      const b=new mapboxgl.LngLatBounds();
      path.forEach(p=>b.extend(p));
      m.fitBounds(b,{padding:{top:60,bottom:120,left:60,right:60},duration:800});

      let step=0;
      polls.delAnim=setInterval(()=>{
        step++;
        if(step>path.length-1){clearInterval(polls.delAnim);return}
        const done=path.slice(0,step+1);
        const rem=path.slice(step);
        m.getSource('d-done').setData({type:'Feature',geometry:{type:'LineString',coordinates:done}});
        m.getSource('d-rem').setData({type:'Feature',geometry:{type:'LineString',coordinates:rem}});
        courMk.setLngLat(path[step]);
      },260);
    }
  });

  // Fallback error handler — tokens/tiles sometimes fail in preview frames
  m.on('error',e=>{console.warn('[map]',id,e?.error?.message||e)});
}

// Init
loadSettings();
document.documentElement.setAttribute('data-mode',S.mode||'requester');
document.body.classList.add('mode-'+(S.mode||'requester'));
render();
</script>
</body>
</html>
