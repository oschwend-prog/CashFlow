<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050A12">
<title>CashFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
:root{--bg:#050A12;--bg2:#080E19;--sf:#0B1221;--sf2:#111D2E;--sf3:#162236;--em:#00E8B8;--em2:rgba(0,232,184,.10);--em3:rgba(0,232,184,.20);--am:#FFB800;--am2:rgba(255,184,0,.10);--am3:rgba(255,184,0,.20);--wh:#F0F2F5;--gr:#8A9BB0;--mu:#5A6D82;--bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.10);--rd:#FF4D6A;--blu:#6C8CFF;--r:16px;--rs:12px;--st:env(safe-area-inset-top,20px);--sb:env(safe-area-inset-bottom,20px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',-apple-system,sans-serif;background:var(--bg);color:var(--wh);overscroll-behavior:none;-webkit-font-smoothing:antialiased}
input,button,select,textarea{font-family:inherit}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(0,232,184,0)}50%{box-shadow:0 0 24px 4px rgba(0,232,184,.12)}}
@keyframes glowAmber{0%,100%{box-shadow:0 0 0 0 rgba(255,184,0,0)}50%{box-shadow:0 0 24px 4px rgba(255,184,0,.15)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes logoReveal{0%{opacity:0;transform:scale(.8) translateY(10px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

#splash{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease}
#splash.hide{opacity:0;pointer-events:none}
.splash-logo{font-size:52px;font-weight:900;letter-spacing:-2px;animation:logoReveal .8s ease forwards}
.splash-logo .w{color:var(--wh)}.splash-logo .g{background:linear-gradient(135deg,var(--em),#00D4A8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.splash-tag{font-size:14px;color:var(--mu);margin-top:12px;animation:fadeUp .8s .3s ease both}
.splash-bar{width:120px;height:3px;background:var(--sf2);border-radius:2px;margin-top:32px;overflow:hidden;animation:fadeIn .5s .5s ease both}
.splash-bar-fill{width:0;height:100%;background:var(--em);border-radius:2px;transition:width 1.2s ease}

.scr{position:absolute;inset:0;display:none;flex-direction:column;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(76px + var(--sb))}
.scr.on{display:flex;animation:fadeIn .25s ease}.scr.nt{padding-bottom:var(--sb)}

/* Auth */
#auth{justify-content:center;padding:32px;z-index:100;position:relative}
#auth::before{content:'';position:absolute;top:10%;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(0,232,184,.06) 0%,transparent 70%);pointer-events:none}
.a-logo{font-size:48px;font-weight:900;letter-spacing:-2px;margin-bottom:56px;text-align:center;position:relative;z-index:1}
.a-logo .w{color:var(--wh)}.a-logo .g{background:linear-gradient(135deg,var(--em),#00D4A8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.a-step{display:none;position:relative;z-index:1}.a-step.on{display:block}
.a-ttl{font-size:24px;font-weight:700;margin-bottom:6px}
.a-sub{font-size:14px;color:var(--gr);margin-bottom:28px;line-height:1.55}
.a-inp{width:100%;padding:16px 18px;font-size:17px;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);color:var(--wh);outline:none;transition:border .2s}
.a-inp:focus{border-color:var(--em)}.a-inp::placeholder{color:var(--mu)}
.a-btn{width:100%;padding:17px;margin-top:20px;background:var(--em);border:none;border-radius:var(--r);font-size:16px;font-weight:700;color:var(--bg);cursor:pointer;transition:opacity .2s,transform .1s}
.a-btn:active{transform:scale(.98)}.a-btn:disabled{opacity:.45}
.a-btn2{background:var(--sf2);color:var(--gr);margin-top:12px}
.a-err{color:var(--rd);font-size:13px;margin-top:10px;min-height:18px}
.a-otp{display:flex;gap:5px;margin-top:4px}
.a-dig{flex:1;height:54px;text-align:center;font-size:22px;font-weight:700;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--wh);outline:none;caret-color:var(--em)}
.a-dig:focus{border-color:var(--em);background:var(--sf2)}
.a-sent{font-size:13px;color:var(--em);margin-bottom:16px}

/* Layout */
.hdr{padding:calc(var(--st) + 14px) 20px 18px;display:flex;align-items:center;justify-content:space-between}
.hdr-g{font-size:13px;color:var(--gr)}.hdr-n{font-size:24px;font-weight:800;margin-top:2px}
.hdr-av{width:44px;height:44px;border-radius:50%;background:var(--em2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--em);cursor:pointer;border:1.5px solid rgba(0,232,184,.25)}
.hdr-back{cursor:pointer;font-size:15px;font-weight:600;color:var(--gr)}.hdr-title{font-size:17px;font-weight:700}
.sec{padding:20px}.sec-t{font-size:15px;font-weight:700;margin-bottom:14px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin:12px 20px 0}
.conn{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--sf);border-radius:var(--rs);border:1px solid var(--bd);margin:20px 20px 0}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--em);animation:pulse 1.5s infinite}
.conn-txt{font-size:13px;color:var(--gr)}.conn-r{margin-left:auto;font-size:12px;color:var(--mu)}

/* Role cards */
.roles{display:flex;gap:14px;padding:0 20px;margin-top:24px}
.role{flex:1;padding:30px 16px;border-radius:var(--r);border:1px solid var(--bd2);cursor:pointer;transition:all .3s;text-align:center;position:relative;overflow:hidden;background:var(--sf)}
.role::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;border-radius:var(--r)}
.role.get::before{background:radial-gradient(circle at 50% 120%,var(--em3) 0%,transparent 70%)}
.role.del::before{background:radial-gradient(circle at 50% 120%,var(--am3) 0%,transparent 70%)}
.role:active::before{opacity:1}
.role-i{font-size:42px;margin-bottom:14px;position:relative;z-index:1}
.role-t{font-size:17px;font-weight:700;position:relative;z-index:1}
.role-s{font-size:13px;color:var(--gr);margin-top:6px;position:relative;z-index:1}

/* Sub-role picker (courier vs cashpoint) */
.sub-roles{display:flex;gap:12px;padding:0 20px;margin-top:16px}
.sub-role{flex:1;padding:20px 14px;border-radius:var(--r);border:1px solid var(--bd2);cursor:pointer;text-align:center;background:var(--sf);transition:all .2s}
.sub-role:active{border-color:var(--am);background:rgba(255,184,0,.04)}
.sub-role .sr-i{font-size:32px;margin-bottom:8px}
.sub-role .sr-t{font-size:15px;font-weight:700}
.sub-role .sr-s{font-size:12px;color:var(--gr);margin-top:4px;line-height:1.4}

/* Amount */
.amt-display{text-align:center;padding:36px 0;background:linear-gradient(180deg,var(--sf) 0%,var(--bg2) 100%);border-radius:var(--r);margin:0 20px;border:1px solid var(--bd)}
.amt-label{font-size:12px;color:var(--mu);margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.amt-val{font-size:60px;font-weight:900;letter-spacing:-3px}
.amt-cur{font-size:34px;color:var(--mu);font-weight:600}
.amt-pre{display:flex;gap:8px;padding:16px 20px}
.amt-p{flex:1;min-width:55px;padding:13px 6px;text-align:center;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--wh)}
.amt-p:active,.amt-p.on{border-color:var(--em);color:var(--em);background:var(--em2)}

/* Address */
.addr{padding:0 20px;margin-top:20px}
.addr-wrap{position:relative}
.addr-wrap input{width:100%;padding:14px 16px 14px 44px;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--wh);font-size:15px;outline:none}
.addr-wrap input:focus{border-color:var(--em)}
.addr-wrap .pin{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px}
.addr-res{background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);margin-top:4px;max-height:200px;overflow-y:auto;display:none}
.addr-r{padding:12px 16px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--bd)}
.addr-r:active{background:var(--sf3)}

/* Fees */
.fees{background:var(--sf);border-radius:var(--r);padding:20px;margin:20px 20px 0;border:1px solid var(--bd)}
.fee-r{display:flex;justify-content:space-between;padding:7px 0;font-size:14px}
.fee-r .l{color:var(--gr)}
.fee-r.tot{border-top:1px solid var(--bd2);padding-top:14px;margin-top:10px;font-weight:700;font-size:17px}

/* Payment method */
.pay-card{background:var(--sf);border-radius:var(--r);padding:16px 20px;margin:12px 20px 0;border:1px solid var(--bd)}
.pay-opt{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--bd);cursor:pointer;transition:opacity .15s}
.pay-opt:last-child{border:none}
.pay-opt:active{opacity:.7}
.pay-opt .po-i{font-size:24px;width:36px;text-align:center}
.pay-opt .po-t{flex:1;font-size:14px;font-weight:600}
.pay-opt .po-r{width:20px;height:20px;border-radius:50%;border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center}
.pay-opt .po-r.sel{border-color:var(--em);background:var(--em)}
.pay-opt .po-r.sel::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--bg)}

/* Courier selection */
.cour-list{padding:0 20px}
.cour-opt{display:flex;align-items:center;gap:14px;padding:16px;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);margin-bottom:10px;cursor:pointer;transition:border .2s;position:relative}
.cour-opt:active{border-color:var(--em)}
.cour-opt .co-av{width:48px;height:48px;border-radius:50%;background:var(--am2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--am)}
.cour-opt .co-info{flex:1}
.cour-opt .co-name{font-size:15px;font-weight:600}
.cour-opt .co-meta{font-size:12px;color:var(--gr);margin-top:2px}
.cour-opt .co-right{text-align:right}
.cour-opt .co-fee{font-size:14px;font-weight:700}
.cour-opt .co-eta{font-size:12px;color:var(--gr)}
.cash-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase}
.cash-badge.ready{background:var(--em2);color:var(--em)}
.cash-badge.atm{background:rgba(255,255,255,.04);color:var(--mu)}

/* Delivery steps */
.del-steps{display:flex;gap:4px;margin:14px 0}
.del-step{flex:1;height:4px;border-radius:2px;background:var(--sf3)}
.del-step.done{background:var(--em)}
.del-step.done.am{background:var(--am)}
.del-hint{font-size:12px;color:var(--gr);margin-top:6px}
.step-info{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:var(--rs);margin-top:10px;font-size:12px;font-weight:600}
.step-info.flash{background:var(--em2);color:var(--em)}
.step-info.wait{background:var(--am2);color:var(--am)}

/* QR / Banknote verify */
.verify-card{text-align:center;padding:24px;background:var(--sf);border-radius:var(--r);margin:12px 20px;border:1px solid var(--bd)}
.verify-icon{font-size:56px;margin-bottom:12px}
.verify-title{font-size:18px;font-weight:700;margin-bottom:6px}
.verify-sub{font-size:13px;color:var(--gr);line-height:1.5;margin-bottom:20px}
.verify-checks{text-align:left;margin-bottom:20px}
.verify-check{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bd)}
.verify-check:last-child{border:none}
.verify-cb{width:24px;height:24px;border-radius:8px;border:2px solid var(--bd2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.verify-cb.checked{background:var(--em);border-color:var(--em)}
.verify-cb.checked::after{content:'✓';color:var(--bg);font-size:14px;font-weight:800}
.verify-check-txt{font-size:14px}

/* Courier settings */
.cour-set{background:var(--sf);border-radius:var(--r);padding:20px;margin:12px 20px 0;border:1px solid var(--bd)}
.cs-lbl{font-size:15px;font-weight:700;margin-bottom:2px}
.cs-sub{font-size:12px;color:var(--gr);margin-bottom:14px}
.cp-pre{display:flex;gap:8px}
.cp-p{flex:1;padding:12px 6px;text-align:center;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;color:var(--wh)}
.cp-p:active,.cp-p.on{border-color:var(--am);color:var(--am);background:var(--am2)}
.fee-slider{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--em) 0%,var(--am) 50%,var(--rd) 100%);outline:none;cursor:pointer}
.fee-slider::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--wh);border:3px solid var(--am);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.fp-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--gr)}
.fp-val{color:var(--wh);font-weight:600}.fp-am{color:var(--am)!important}

/* Cashpoint settings */
.cp-field{margin-bottom:12px}
.cp-field label{font-size:11px;color:var(--mu);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.cp-field input{width:100%;padding:12px 14px;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--wh);font-size:14px;outline:none}
.cp-field input:focus{border-color:var(--am)}

/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--sf);border-radius:var(--r);padding:20px;margin:0 20px;border:1px solid var(--bd)}
.toggle-track{width:56px;height:30px;border-radius:15px;background:var(--sf3);cursor:pointer;position:relative;transition:background .3s}
.toggle-track.on{background:var(--em)}.toggle-thumb{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:transform .3s;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.toggle-track.on .toggle-thumb{transform:translateX(26px)}

/* Earnings */
.earn-hero{text-align:center;padding:28px;background:linear-gradient(180deg,var(--sf) 0%,var(--bg) 100%);border-radius:var(--r);margin:16px 20px 0;border:1px solid var(--bd)}
.earn-val{font-size:48px;font-weight:900;color:var(--am);animation:countUp .5s ease}
.earn-lbl{font-size:12px;color:var(--gr);margin-top:4px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.earn-stats{display:flex;gap:10px;padding:0 20px;margin-top:12px}
.earn-stat{flex:1;background:var(--sf);border-radius:var(--rs);padding:16px;text-align:center;border:1px solid var(--bd)}
.earn-stat .v{font-size:22px;font-weight:700}
.earn-stat .l{font-size:11px;color:var(--gr);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* Heatmap */
.heatmap{padding:0 20px;margin-top:16px}
.heatmap-title{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--gr)}
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.heatmap-cell{aspect-ratio:1;border-radius:4px;background:var(--sf2)}
.heatmap-cell.l1{background:rgba(0,232,184,.1)}.heatmap-cell.l2{background:rgba(0,232,184,.25)}.heatmap-cell.l3{background:rgba(0,232,184,.45)}.heatmap-cell.l4{background:rgba(0,232,184,.7)}

/* Incoming request */
.inc-card{background:var(--sf);border:2px solid var(--am);border-radius:var(--r);padding:20px;margin:16px 20px;animation:glowAmber 2s infinite}
.inc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.inc-amt{font-size:36px;font-weight:900}.inc-fee{font-size:15px;color:var(--am);font-weight:700}
.inc-meta{font-size:13px;color:var(--gr);margin-bottom:16px}
.inc-btns{display:flex;gap:10px}
.inc-btns button{flex:1;padding:15px;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer}
.inc-accept{background:var(--am);color:var(--bg)}.inc-decline{background:var(--sf2);color:var(--gr)}

/* Map */
.map-c{height:260px;border-radius:var(--r);margin:0 20px;overflow:hidden;border:1px solid var(--bd)}.map-c>div{width:100%;height:100%}

/* Status */
.stat-card{background:var(--sf);border-radius:var(--r);padding:20px;margin:16px 20px;border:1px solid var(--bd)}
.stat-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600}
.stat-badge.active{background:var(--em2);color:var(--em)}.stat-badge.pending{background:var(--am2);color:var(--am)}
.stat-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite}
.stat-row{display:flex;justify-content:space-between;padding:9px 0;font-size:14px;border-bottom:1px solid var(--bd)}
.stat-row:last-child{border:none}.stat-row .k{color:var(--gr)}

/* Orders */
.ord{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--bd);cursor:pointer}
.ord-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.ord-ic.in{background:var(--em2)}.ord-ic.out{background:var(--am2)}
.ord-info{flex:1}.ord-info .t{font-size:15px;font-weight:600}.ord-info .b{font-size:12px;color:var(--gr);margin-top:3px}
.ord-amt{font-size:16px;font-weight:700}

/* Profile */
.prof-hdr{text-align:center;padding:calc(var(--st) + 20px) 20px 24px;background:linear-gradient(180deg,var(--sf) 0%,var(--bg) 100%);border-bottom:1px solid var(--bd)}
.prof-av{width:84px;height:84px;border-radius:50%;background:var(--em2);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:var(--em);margin:0 auto 14px;border:2px solid var(--em)}
.prof-name{font-size:24px;font-weight:800}.prof-email{font-size:13px;color:var(--gr);margin-top:4px}
.prof-ver{display:inline-flex;align-items:center;gap:4px;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;background:var(--em2);color:var(--em);margin-top:10px}
.prof-since{font-size:12px;color:var(--mu);margin-top:8px}
.prof-ml{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);padding:20px 20px 8px}
.prof-item{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--bd);cursor:pointer}
.prof-item:active{background:var(--sf)}.prof-item .pi{font-size:20px;width:28px;text-align:center}
.prof-item .pt{flex:1;font-size:15px}.prof-item .pa{color:var(--mu);font-size:16px}
.prof-item.danger .pt{color:var(--rd)}
.edit-row{display:flex;gap:8px;padding:0 20px;margin-top:8px}
.edit-row input{flex:1;padding:12px 14px;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--wh);font-size:15px;outline:none}
.edit-row button{padding:12px 20px;background:var(--em);border:none;border-radius:var(--rs);font-size:14px;font-weight:700;color:var(--bg);cursor:pointer}

/* Buttons */
.btn{margin:20px;padding:18px;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.4}
.btn-em{background:var(--em);color:var(--bg)}.btn-am{background:var(--am);color:var(--bg)}.btn-ghost{background:var(--sf2);color:var(--gr)}
.btn-breathe{animation:breathe 3s ease infinite}

/* Tab bar */
.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(5,10,18,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--bd);display:flex;padding:6px 0 var(--sb);z-index:90}
.tabs.hide{display:none}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;cursor:pointer;color:var(--mu);font-size:10px;font-weight:500;transition:color .2s}
.tab.on{color:var(--em)}.tab .i{font-size:22px}

/* Toast */
.toast{position:fixed;top:calc(var(--st) + 8px);left:12px;right:12px;background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);padding:14px 18px;display:flex;align-items:center;gap:12px;z-index:200;transform:translateY(-120%);transition:transform .35s ease}
.toast.show{transform:translateY(0)}
.toast-i{font-size:20px}.toast-t{flex:1}.toast-t .t1{font-size:14px;font-weight:600}.toast-t .t2{font-size:12px;color:var(--gr)}

/* Misc */
.spin{width:40px;height:40px;border:3px solid var(--bd2);border-top-color:var(--em);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;gap:18px}
.loading .msg{color:var(--gr);font-size:14px}
.empty{text-align:center;padding:56px 32px}
.empty .ei{font-size:48px;margin-bottom:14px}.empty .et{font-size:18px;font-weight:600;margin-bottom:6px}.empty .es{font-size:14px;color:var(--gr);line-height:1.5}
.app-foot{text-align:center;padding:28px 20px 44px;font-size:11px;color:var(--mu)}

/* Floating order pill */
.order-pill{position:fixed;bottom:calc(76px + var(--sb) + 8px);left:16px;right:16px;background:var(--sf2);border:1px solid var(--em);border-radius:var(--r);padding:14px 18px;display:none;align-items:center;gap:12px;z-index:85;cursor:pointer;animation:glow 2s infinite}
.order-pill.show{display:flex}
.order-pill .op-dot{width:8px;height:8px;border-radius:50%;background:var(--em);animation:pulse 1.5s infinite}
.order-pill .op-txt{flex:1;font-size:13px;font-weight:600}
.order-pill .op-amt{font-size:15px;font-weight:700;color:var(--em)}
</style>
</head>

<div id="splash"><div class="splash-logo"><span class="w">Cash</span><span class="g">Flow</span></div><div class="splash-tag">Bringing cash back to you</div><div class="splash-bar"><div class="splash-bar-fill" id="splashBar"></div></div></div>

// ---- Supabase ----
async function sb(ep,o={}){const h={'Content-Type':'application/json',apikey:SK,...(o.headers||{})};h.Authorization='Bearer '+(S.user?.access_token||SK);return fetch(SB+ep,{...o,headers:h})}
async function rest(t,q='',o={}){const r=await sb('/rest/v1/'+t+'?'+q,o);if(!r.ok)throw new Error(await r.text());return r.json()}
function toast(t,s,i='✓'){$('tT').textContent=t;$('tS').textContent=s;$('tI').textContent=i;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),3500)}

// ---- Splash ----
setTimeout(()=>{$('splashBar').style.width='100%'},100);
setTimeout(()=>{$('splash').classList.add('hide');setTimeout(()=>$('splash').remove(),600)},1800);

// ---- Render engine ----
function render(){
  const a=$('app');
  // Clear non-active screens
  a.innerHTML='';
  
  switch(S.screen){
    case 'auth': a.innerHTML=renderAuth(); break;
    case 'home': a.innerHTML=renderHome(); break;
    case 'subRole': a.innerHTML=renderSubRole(); break;
    case 'request': a.innerHTML=renderRequest(); break;
    case 'couriers': a.innerHTML=renderCourierSelect(); break;
    case 'matching': a.innerHTML=renderMatching(); break;
    case 'tracking': a.innerHTML=renderTracking(); break;
    case 'verify': a.innerHTML=renderVerify(); break;
    case 'courDash': a.innerHTML=renderCourierDash(); break;
    case 'cpSetup': a.innerHTML=renderCashPoint(); break;
    case 'courDel': a.innerHTML=renderCourierDelivery(); break;
    case 'courQR': a.innerHTML=renderCourierQR(); break;
    case 'chat': a.innerHTML=renderChat(); break;
    case 'tip': a.innerHTML=renderTip(); break;
    case 'rate': a.innerHTML=renderRating(); break;
    case 'earn': a.innerHTML=renderEarnings(); break;
    case 'history': a.innerHTML=renderHistory(); break;
    case 'profile': a.innerHTML=renderProfile(); break;
  }
  
  // Tab bar
  const noTab=['auth','matching','tracking','verify','courDel','courQR','subRole','couriers','cpSetup','chat','tip','rate'];
  $('tabBar').classList.toggle('hide',noTab.includes(S.screen)||!S.user);
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.t===S.tab));
  
  // Order pill
  const pill=$('orderPill');
  if(S.order&&!['tracking','verify','courDel','courQR','matching'].includes(S.screen)){
    pill.classList.add('show');$('pillTxt').textContent='Order in progress';$('pillAmt').textContent='£'+S.order.amount;
  }else pill.classList.remove('show');
  
  // Init maps after render
  requestAnimationFrame(()=>{
    document.querySelectorAll('[data-map]').forEach(el=>{
      if(!el.dataset.init){el.dataset.init='1';initMapEl(el)}
    });
  });
}

function go(screen,tab){S.screen=screen;if(tab)S.tab=tab;render()}
function showTab(t){S.tab=t;go(t==='earn'?'earn':t==='history'?'history':t==='profile'?'profile':'home',t)}
function resumeOrder(){if(S.role==='req')go('tracking');else go('courDel')}

// ---- Courier Selection ----

  couriers.sort((a,b)=>a.adjEta-b.adjEta);
  return`<div class="scr on nt">
    <div class="hdr"><div class="hdr-back" onclick="go('request')">← Back</div><div class="hdr-title">Choose Courier</div><div style="width:44px"></div></div>

    </div>
  </div>`;
}

// ---- Tracking (requester) ----
function renderTracking(){
  const c=S.selectedCourier||MOCK_COURIERS[0];
  const hasCash=c.cash>=S.amt;
  const totalSteps=hasCash?4:5;
  const stepLabels=hasCash?['Matched','En route','Arrived','Verified']:['Matched','Collecting cash','En route','Arrived','Verified'];
  return`<div class="scr on nt">
    <div class="hdr"><div class="hdr-title">Cash Delivery</div><div></div></div>
    <div class="map-c"><div data-map="track" data-lat="${S.coords?S.coords[1]:51.5194}" data-lng="${S.coords?S.coords[0]:-0.0738}"></div></div>
    <div class="stat-card">
      <div class="stat-badge active"><span class="stat-dot"></span> ${stepLabels[Math.min(S.orderStep,totalSteps-1)]}</div>
      ${hasCash&&S.orderStep<2?'<div class="step-info flash" style="margin-top:10px">⚡ Courier has cash — no ATM stop needed</div>':''}
      <div class="del-steps">${Array.from({length:totalSteps}).map((_,i)=>`<div class="del-step ${i<=S.orderStep?'done':''}"></div>`).join('')}</div>
      <div class="del-hint">${stepLabels[Math.min(S.orderStep,totalSteps-1)]}</div>
      <div style="margin-top:14px">
        <div class="stat-row"><span class="k">Courier</span><span>${c.name}</span></div>
        <div class="stat-row"><span class="k">Amount</span><span>£${S.amt}</span></div>
        <div class="stat-row"><span class="k">ETA</span><span id="trackETA">${hasCash?c.eta:c.eta+8} min</span></div>

// ---- Chat Logic ----
function sendChat(quickMsg){
  const text=quickMsg||S.chatInput;if(!text)return;
  const now=new Date();const time=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  S.chatMessages.push({from:'me',text,time});S.chatInput='';render();
  // Simulate courier reply
  setTimeout(()=>{const replies=['Got it!','On my way 👍','See you soon','Nearly there!'];
    S.chatMessages.push({from:'courier',text:replies[Math.floor(Math.random()*replies.length)],time});render()},1500);
}

function submitTip(){if(S.tipAmount>0)toast('Tip sent!','£'+S.tipAmount+' sent to your courier','💰');go('rate')}
function submitRating(){S.order=null;S.addr=null;S.coords=null;S.orderStep=0;S.chatMessages=[];
  if(S.rating>0)toast('Thanks!','Rating submitted','⭐');go('home','home')}

// ---- GPS Detect ----
function detectGPS(){
  if(!navigator.geolocation){toast('No GPS','Location not available','📍');return}
  toast('Detecting...','Finding your location','📍');
  navigator.geolocation.getCurrentPosition(async pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    try{const r=await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${lng},${lat}.json?access_token=${MBT}&limit=1`);
      const d=await r.json();if(d.features?.[0]){const f=d.features[0];S.addr=f.place_name;S.coords=[lng,lat];render();toast('Found!',f.place_name.substring(0,30),'✅');}
    }catch(e){toast('Error','Could not detect address','❌')}
  },()=>toast('Denied','Allow location access in settings','📍'));
}

// ---- Auth Logic ----
async function sendOTP(){
  const e=document.querySelector('#authEmail')?.value?.trim()||S.email;
  if(!e||!e.includes('@'))return;S.email=e;
  try{const r=await fetch(SB+'/auth/v1/otp',{method:'POST',headers:{'Content-Type':'application/json',apikey:SK},body:JSON.stringify({email:e})});
    const d=await r.json();if(d.error)throw new Error(d.error.message);S._otpSent=true;render();
    setTimeout(()=>{const row=$('otpRow');if(!row)return;row.innerHTML='';
      for(let i=0;i<8;i++){const inp=document.createElement('input');inp.type='text';inp.inputMode='numeric';inp.maxLength=1;inp.className='a-dig';
        inp.addEventListener('input',function(){if(this.value&&i<7)row.children[i+1].focus();if(i===7)verifyOTP()});
        inp.addEventListener('keydown',function(ev){if(ev.key==='Backspace'&&!this.value&&i>0)row.children[i-1].focus()});row.appendChild(inp)}
      row.children[0]?.focus();
    },100);
  }catch(er){toast('Error',er.message,'❌')}
}
async function verifyOTP(){
  const ds=document.querySelectorAll('.a-dig'),code=Array.from(ds).map(d=>d.value).join('');
  if(code.length<8)return;
  try{const r=await fetch(SB+'/auth/v1/verify',{method:'POST',headers:{'Content-Type':'application/json',apikey:SK},body:JSON.stringify({email:S.email,token:code,type:'email'})});
    const d=await r.json();if(d.error)throw new Error(d.error.message);
    S.user={id:d.user?.id,email:d.user?.email||S.email,access_token:d.access_token};
    try{const p=await rest('profiles','id=eq.'+S.user.id+'&select=*');
      if(!p.length)await sb('/rest/v1/profiles',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify({id:S.user.id,display_name:S.email.split('@')[0]})});
      else S.user.display_name=p[0].display_name;
    }catch(e){S.user.display_name=S.email.split('@')[0]}
    S._otpSent=false;go('home','home');toast('Welcome!',S.email,'✓');
  }catch(er){const e2=$('authErr2');if(e2)e2.textContent=er.message}
}
function signOut(){sb('/auth/v1/logout',{method:'POST'}).catch(()=>{});S.user=null;S._otpSent=false;go('auth');Object.values(polls).forEach(clearInterval)}

// ---- Request Logic ----
let searchTO;
function searchAddr(q){clearTimeout(searchTO);const res=$('addrRes');if(!res||q.length<3){if(res)res.style.display='none';return}
  searchTO=setTimeout(async()=>{try{const r=await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(q)}.json?access_token=${MBT}&country=GB&proximity=-0.0738,51.5194&limit=5`);
    const d=await r.json();if(d.features?.length){res.innerHTML=d.features.map(f=>`<div class="addr-r" onclick="pickAddr('${f.place_name.replace(/'/g,"\\'")}',${f.center[0]},${f.center[1]})">${f.place_name}</div>`).join('');res.style.display='block'}else res.style.display='none'}catch(e){}},300)}
function pickAddr(n,lng,lat){S.addr=n;S.coords=[lng,lat];render()}

function findCouriers(){if(!S.addr){toast('Enter address','Select a delivery address','📍');return}if(S.amt<20){toast('Min £20','','⚠️');return}
  S.matchedCouriers=MOCK_COURIERS.filter(c=>c.cash>=S.amt||true);go('couriers')}
function pickCourier(id){S.selectedCourier=MOCK_COURIERS.find(c=>c.id===id);S.courierHasCash=(S.selectedCourier?.cash||0)>=S.amt;
  S.handoverCode=Math.random().toString(36).substring(2,8).toUpperCase();S.orderStep=0;S.verifyChecks=[false,false,false];go('matching');submitOrder()}
async function submitOrder(){
  const sf=S.amt*SVC,tf=FIXED+sf;
  try{const r=await sb('/rest/v1/orders',{method:'POST',headers:{'Prefer':'return=representation'},
    body:JSON.stringify({requester_id:S.user.id,amount:S.amt,delivery_fee:FIXED,service_fee:sf,total_fee:tf,delivery_address:S.addr,delivery_lat:S.coords[1],delivery_lng:S.coords[0],status:'ACCEPTED'})});
    if(!r.ok)throw new Error('Failed');const d=await r.json();S.order=d[0]||d;
    setTimeout(()=>{go('tracking')},2000);
    // Auto-advance steps
    const c=S.selectedCourier;const hasCash=S.courierHasCash;const totalSteps=hasCash?4:5;
    let step=0;polls.track=setInterval(()=>{step++;S.orderStep=step;render();if(step>=totalSteps-1)clearInterval(polls.track)},5000);
  }catch(e){toast('Error',e.message,'❌');go('request')}
}
function cancelReq(){if(S.order)sb('/rest/v1/orders?id=eq.'+S.order.id,{method:'PATCH',body:JSON.stringify({status:'CANCELLED'})}).catch(()=>{});
  S.order=null;go('request')}
function confirmHandover(){if(S.order)sb('/rest/v1/orders?id=eq.'+S.order.id,{method:'PATCH',body:JSON.stringify({status:'CONFIRMED'})}).catch(()=>{});
  toast('Cash received!','£'+S.amt+' delivered','✅');S.tipAmount=0;S.rating=0;go('tip')}

// ---- Courier Logic ----
function toggleOnline(){if(!S.online&&S.cashOnHand<20){toast('Set cash','Need at least £20','⚠️');return}
  S.online=!S.online;if(S.online)toast("You're online!",'£'+S.cashOnHand+' · '+S.courierFee+'%','🟢');render()}
function advDeliveryStep(){S.orderStep++;render()}
function courierScannedQR(){S.orderStep++;go('courDel');toast('QR verified!','Hand over the cash','✅')}
function saveCashPoint(){toast('Saved!','CashPoint settings updated','✓');go('home','home')}

// ---- Profile Logic ----
async function saveName(){const inp=$('pNameInp');if(!inp)return;const n=inp.value.trim();if(!n)return;
  try{await sb('/rest/v1/profiles?id=eq.'+S.user.id,{method:'PATCH',body:JSON.stringify({display_name:n})});
    S.user.display_name=n;toast('Saved!','Name updated','✓');render()}catch(e){toast('Error',e.message,'❌')}}

// ---- Maps ----
function initMapEl(el){
  const id=el.dataset.map;const lat=parseFloat(el.dataset.lat);const lng=parseFloat(el.dataset.lng);
  mapboxgl.accessToken=MBT;
  const m=new mapboxgl.Map({container:el,style:'mapbox://styles/mapbox/dark-v11',center:[lng,lat],zoom:14,attributionControl:false});
  maps[id]=m;
  if(id==='cour'){navigator.geolocation?.getCurrentPosition(p=>{m.setCenter([p.coords.longitude,p.coords.latitude]);new mapboxgl.Marker({color:'#FFB800'}).setLngLat([p.coords.longitude,p.coords.latitude]).addTo(m)},()=>{new mapboxgl.Marker({color:'#FFB800'}).setLngLat([lng,lat]).addTo(m)})}
  if(id==='track'&&S.coords){new mapboxgl.Marker({color:'#00E8B8'}).setLngLat(S.coords).addTo(m);
    const cp=[S.coords[0]+.003,S.coords[1]+.002];const cm=new mapboxgl.Marker({color:'#FFB800'}).setLngLat(cp).addTo(m);
    let step=0;const iv=setInterval(()=>{step++;if(step>=40){clearInterval(iv);return}cm.setLngLat([cp[0]+(S.coords[0]-cp[0])*(step/40),cp[1]+(S.coords[1]-cp[1])*(step/40)])},200)}
  if(id==='del'){new mapboxgl.Marker({color:'#00E8B8'}).setLngLat([lng,lat]).addTo(m)}
}

// Init
render();
</script>
